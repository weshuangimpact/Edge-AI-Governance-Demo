<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDUINO-Q 開發板 MPU邊緣運算+MUC(TrustZone-M)治理裝置平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isRunning, setIsRunning] = useState(true);
            const [pipelineLogs, setPipelineLogs] = useState([]);
            const [adjudicationLogs, setAdjudicationLogs] = useState([]);
            const [healingLogs, setHealingLogs] = useState([]);
            const [evidenceLogs, setEvidenceLogs] = useState([]);
            
            const counterRef = useRef(1000);
            const prevHashRef = useRef("00000000000000000000000000000000");

            const mockHash = (str) => {
                let hash = 0;
                for (let i = 0; i < str.length; i++) hash = (hash << 5) - hash + str.charCodeAt(i) | 0;
                return Math.abs(hash).toString(16).padStart(32, '0');
            };

            const getTime = () => new Date().toISOString().substring(11, 23);

            const triggerEvent = () => {
                const id = `CMD-${Math.floor(Math.random() * 10000).toString().padStart(4, '0')}`;
                const rand = Math.random();
                let eventType = 'normal';
                let rawCmd = '{"axis":"X", "speed": 10}';
                let fixedCmd = '';
                
                if (rand > 0.8) {
                    eventType = 'malicious';
                    rawCmd = '{"axis":"Z", "speed": 999, "override": true}';
                } else if (rand > 0.5) {
                    eventType = 'typo';
                    rawCmd = '{"axis":"Y", "speeed": 20}';
                    fixedCmd = '{"axis":"Y", "speed": 20}';
                }

                // 1. 執行管線 (MPU 邊緣生成)
                setPipelineLogs(prev => [{ id, time: getTime(), cmd: rawCmd, type: eventType }, ...prev].slice(0, 50));

                setTimeout(() => {
                    // 2. 即時判定 (MCU TrustZone-M)
                    if (eventType === 'normal') {
                        setAdjudicationLogs(prev => [{ id, time: getTime(), status: 'O', msg: '完全合規' }, ...prev].slice(0, 50));
                        generateEvidence(id, 'ALLOW');
                    } else if (eventType === 'malicious') {
                        setAdjudicationLogs(prev => [{ id, time: getTime(), status: 'X', msg: '參數越界/惡意指令' }, ...prev].slice(0, 50));
                        generateEvidence(id, 'DENY');
                    } else {
                        setAdjudicationLogs(prev => [{ id, time: getTime(), status: '-', msg: '語法結構異常 (Pending)' }, ...prev].slice(0, 50));
                        
                        setTimeout(() => {
                            // 3. 即時修正 (MPU 結構修復)
                            setHealingLogs(prev => [{ id, time: getTime(), from: rawCmd, to: fixedCmd, sim: '98%' }, ...prev].slice(0, 50));
                            
                            setTimeout(() => {
                                // 修復後再次判定
                                setAdjudicationLogs(prev => [{ id, time: getTime(), status: 'O', msg: '修復後合規放行' }, ...prev].slice(0, 50));
                                generateEvidence(id, 'ALLOW_HEALED');
                            }, 400);
                        }, 600);
                    }
                }, 300);
            };

            const generateEvidence = (id, action) => {
                const currentCounter = counterRef.current++;
                const newHash = mockHash(`${id}${action}${currentCounter}${prevHashRef.current}`);
                setEvidenceLogs(prev => [{ 
                    id, 
                    time: getTime(), 
                    action, 
                    counter: currentCounter.toString(16).toUpperCase(), 
                    hash: newHash 
                }, ...prev].slice(0, 50));
                prevHashRef.current = newHash;
            };

            useEffect(() => {
                if (!isRunning) return;
                const interval = setInterval(triggerEvent, 1200);
                return () => clearInterval(interval);
            }, [isRunning]);

            return (
                <div className="h-screen p-4 flex flex-col gap-4">
                    <header className="flex justify-between items-center pb-2 border-b border-slate-700">
                        <h1 className="text-xl font-bold text-cyan-400 tracking-wider">
                            ARDUINO-Q 開發板 MPU邊緣運算+MUC(TrustZone-M)治理裝置平台
                        </h1>
                        <button 
                            onClick={() => setIsRunning(!isRunning)} 
                            className={`px-4 py-1 rounded text-sm font-bold ${isRunning ? 'bg-rose-600' : 'bg-emerald-600'}`}
                        >
                            {isRunning ? '暫停展示' : '啟動展示'}
                        </button>
                    </header>

                    <div className="grid grid-cols-2 grid-rows-2 gap-4 h-[calc(100vh-80px)]">
                        
                        {/* 1. 執行管線 */}
                        <div className="bg-slate-900 border border-blue-900 rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-blue-950 px-3 py-2 border-b border-blue-900 text-sm font-bold text-blue-300">
                                [1] MPU 邊緣執行管線 (原始推論事件流)
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 custom-scrollbar space-y-2">
                                {pipelineLogs.map(log => (
                                    <div key={log.id+log.type} className="text-xs font-mono">
                                        <span className="text-slate-500">[{log.time}]</span> 
                                        <span className="text-blue-400 ml-2">{log.id}</span>
                                        <div className={`mt-1 pl-4 ${log.type === 'malicious' ? 'text-rose-400' : log.type === 'typo' ? 'text-amber-400' : 'text-slate-300'}`}>
                                            {log.cmd}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 2. 即時判定 */}
                        <div className="bg-slate-900 border border-rose-900 rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-rose-950 px-3 py-2 border-b border-rose-900 text-sm font-bold text-rose-300">
                                [2] MCU TrustZone-M 即時裁決 (零信任硬體閘門)
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 custom-scrollbar space-y-2">
                                {adjudicationLogs.map((log, i) => (
                                    <div key={i} className="text-xs font-mono flex items-center justify-between bg-slate-800/50 p-2 rounded">
                                        <div>
                                            <span className="text-slate-500">[{log.time}]</span>
                                            <span className="text-rose-300 ml-2">{log.id}</span>
                                            <span className="text-slate-300 ml-3">{log.msg}</span>
                                        </div>
                                        <div className={`text-lg font-bold ${log.status === 'O' ? 'text-emerald-500' : log.status === 'X' ? 'text-rose-500' : 'text-amber-500'}`}>
                                            [{log.status}]
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 3. 即時修正 */}
                        <div className="bg-slate-900 border border-amber-900 rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-amber-950 px-3 py-2 border-b border-amber-900 text-sm font-bold text-amber-300">
                                [3] MPU 相似度即時修正 (Self-Healing)
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 custom-scrollbar space-y-2">
                                {healingLogs.map((log, i) => (
                                    <div key={i} className="text-xs font-mono bg-slate-800/50 p-2 rounded border border-amber-900/50">
                                        <div className="flex justify-between mb-1">
                                            <span className="text-amber-400">{log.id}</span>
                                            <span className="text-emerald-400">相似度: {log.sim}</span>
                                        </div>
                                        <div className="text-rose-400 line-through">{log.from}</div>
                                        <div className="text-emerald-400 mt-1">➔ {log.to}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 4. 證據鏈 */}
                        <div className="bg-slate-900 border border-emerald-900 rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-emerald-950 px-3 py-2 border-b border-emerald-900 text-sm font-bold text-emerald-300">
                                [4] 不可變治理稽核帳本 (USB 實體證據鏈)
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 custom-scrollbar space-y-2">
                                {evidenceLogs.map((log, i) => (
                                    <div key={i} className="text-xs font-mono bg-slate-800/30 p-2 rounded border-l-2 border-emerald-500">
                                        <div className="flex justify-between text-slate-400 mb-1">
                                            <span>{log.id} | CTR: 0x{log.counter}</span>
                                            <span className={log.action.includes('ALLOW') ? 'text-emerald-400' : 'text-rose-400'}>{log.action}</span>
                                        </div>
                                        <div className="text-emerald-500/80 truncate">Hash: {log.hash}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
