<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDUINO-Q 開發板 MPU邊緣運算+MCU(TrustZone-M)治理裝置平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isRunning, setIsRunning] = useState(true);
            const [isTaskPaused, setIsTaskPaused] = useState(false); // 模擬背壓/物理鎖定
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [humanQueue, setHumanQueue] = useState([]);
            
            const [pipelineLogs, setPipelineLogs] = useState([]);
            const [adjudicationLogs, setAdjudicationLogs] = useState([]);
            const [healingLogs, setHealingLogs] = useState([]);
            const [evidenceLogs, setEvidenceLogs] = useState([]);
            
            // 任務迴圈控制器
            const taskIDRef = useRef(1);
            const taskStepRef = useRef(1);
            const counterRef = useRef(1000);
            const prevHashRef = useRef("00000000000000000000000000000000");

            const mockHash = (str) => {
                let hash = 0;
                for (let i = 0; i < str.length; i++) hash = (hash << 5) - hash + str.charCodeAt(i) | 0;
                return Math.abs(hash).toString(16).padStart(32, '0');
            };

            const getTime = () => new Date().toISOString().substring(11, 23);

            const triggerEvent = () => {
                // 如果系統處於暫停狀態（Pending），停止生成後續指令（背壓機制）
                if (isTaskPaused) return;

                const taskID = `TASK-${String(taskIDRef.current).padStart(3, '0')}`;
                const step = taskStepRef.current;
                const cmdID = `${taskID}-S${String(step).padStart(3, '0')}`;
                
                const rand = Math.random();
                let eventType = 'normal';
                let rawCmd = `{"task":"${taskID}", "step": ${step}, "axis":"X", "speed": 10}`;
                let fixedCmd = '';
                
                // 模擬第 100 步中隨機出現的異常
                if (rand > 0.96) {
                    eventType = 'malicious';
                    rawCmd = `{"task":"${taskID}", "step": ${step}, "axis":"Z", "speed": 999, "override": true}`;
                } else if (rand > 0.92) {
                    eventType = 'require_human';
                    rawCmd = `{"task":"${taskID}", "step": ${step}, "axis":"Y", "speed": "ERR_VAL", "auth": null}`;
                    fixedCmd = `{"task":"${taskID}", "step": ${step}, "axis":"Y", "speed": 50, "auth": "SYSTEM_DEFAULT"}`;
                } else if (rand > 0.88) {
                    eventType = 'typo';
                    rawCmd = `{"task":"${taskID}", "step": ${step}, "axis":"Y", "speeed": 20}`;
                    fixedCmd = `{"task":"${taskID}", "step": ${step}, "axis":"Y", "speed": 20}`;
                }

                // 1. MPU 執行管線
                setPipelineLogs(prev => [{ id: cmdID, time: getTime(), cmd: rawCmd, type: eventType }, ...prev].slice(0, 50));

                setTimeout(() => {
                    // 2. MCU 即時判定
                    if (eventType === 'normal') {
                        setAdjudicationLogs(prev => [{ id: cmdID, time: getTime(), status: 'O', msg: `Task組件[${step}/100] 合規` }, ...prev].slice(0, 50));
                        generateEvidence(cmdID, 'ALLOW');
                        
                        // 推進步驟
                        if (taskStepRef.current >= 100) {
                            taskStepRef.current = 1;
                            taskIDRef.current += 1;
                        } else {
                            taskStepRef.current += 1;
                        }
                    } else if (eventType === 'malicious') {
                        setIsTaskPaused(true); // 發生惡意指令，鎖定整組任務
                        setAdjudicationLogs(prev => [{ id: cmdID, time: getTime(), status: 'X', msg: '嚴重違規：整組任務物理鎖定' }, ...prev].slice(0, 50));
                        generateEvidence(cmdID, 'DENY_TASK_LOCK');
                    } else if (eventType === 'typo') {
                        setIsTaskPaused(true); // 暫停，等待自動修復
                        setAdjudicationLogs(prev => [{ id: cmdID, time: getTime(), status: '-', msg: '語法偏移：觸發邊緣自動修復' }, ...prev].slice(0, 50));
                        
                        setTimeout(() => {
                            setHealingLogs(prev => [{ id: cmdID, time: getTime(), from: rawCmd, to: fixedCmd, sim: '99% 高度相似' }, ...prev].slice(0, 50));
                            setTimeout(() => {
                                setAdjudicationLogs(prev => [{ id: cmdID, time: getTime(), status: 'O', msg: '自動修復成功：恢復任務傳輸' }, ...prev].slice(0, 50));
                                generateEvidence(cmdID, 'ALLOW_HEALED');
                                setIsTaskPaused(false); // 恢復
                                taskStepRef.current += 1;
                            }, 400);
                        }, 600);
                    } else if (eventType === 'require_human') {
                        setIsTaskPaused(true); // 暫停，發送背壓訊號，等待人工介入
                        setAdjudicationLogs(prev => [{ id: cmdID, time: getTime(), status: '-', msg: '邏輯模糊：等待人工授權審查' }, ...prev].slice(0, 50));
                        setHumanQueue(prev => [{ id: cmdID, time: getTime(), rawCmd, aiSuggestedCmd: fixedCmd }, ...prev]);
                    }
                }, 300);
            };

            const generateEvidence = (id, action) => {
                const currentCounter = counterRef.current++;
                const newHash = mockHash(`${id}${action}${currentCounter}${prevHashRef.current}`);
                setEvidenceLogs(prev => [{ 
                    id, time: getTime(), action, counter: currentCounter.toString(16).toUpperCase(), hash: newHash 
                }, ...prev].slice(0, 50));
                prevHashRef.current = newHash;
            };

            const processHumanAction = (item, actionType, customCmd = null) => {
                setHumanQueue(prev => prev.filter(q => q.id !== item.id));
                
                if (actionType === 'ALLOW') {
                    const finalCmd = item.aiSuggestedCmd;
                    setHealingLogs(prev => [{ id: item.id, time: getTime(), from: item.rawCmd, to: finalCmd, sim: '100% 人工驗證' }, ...prev].slice(0, 50));
                    setTimeout(() => {
                        setAdjudicationLogs(prev => [{ id: item.id, time: getTime(), status: 'O', msg: '人工放行：繼續執行任務組' }, ...prev].slice(0, 50));
                        generateEvidence(item.id, 'ALLOW_HUMAN');
                        setIsTaskPaused(false);
                        taskStepRef.current += 1;
                    }, 400);
                } 
                else if (actionType === 'DENY') {
                    setAdjudicationLogs(prev => [{ id: item.id, time: getTime(), status: 'X', msg: '人工廢棄：終止整組任務' }, ...prev].slice(0, 50));
                    generateEvidence(item.id, 'DENY_TASK_ABORT');
                    // 廢棄後重啟新任務
                    taskStepRef.current = 1;
                    taskIDRef.current += 1;
                    setIsTaskPaused(false);
                }
                else if (actionType === 'MANUAL') {
                    const finalCmd = customCmd || item.rawCmd;
                    setHealingLogs(prev => [{ id: item.id, time: getTime(), from: item.rawCmd, to: finalCmd, sim: '100% 手動覆寫' }, ...prev].slice(0, 50));
                    setTimeout(() => {
                        setAdjudicationLogs(prev => [{ id: item.id, time: getTime(), status: 'O', msg: '覆寫成功：恢復任務進度' }, ...prev].slice(0, 50));
                        generateEvidence(item.id, 'ALLOW_MANUAL');
                        setIsTaskPaused(false);
                        taskStepRef.current += 1;
                    }, 400);
                }
                setIsModalOpen(false);
            };

            useEffect(() => {
                if (!isRunning) return;
                const interval = setInterval(triggerEvent, 500); // 縮短間隔以展示 100 步的流暢度
                return () => clearInterval(interval);
            }, [isRunning, isTaskPaused]);

            return (
                <div className="h-screen p-4 flex flex-col gap-4 relative">
                    <header className="flex justify-between items-center pb-2 border-b border-slate-700">
                        <div className="flex flex-col">
                            <h1 className="text-xl font-bold text-cyan-400">ARDUINO-Q 治理裝置平台 (交易式任務模擬)</h1>
                            <div className="text-[10px] text-slate-500 font-mono">STATUS: {isTaskPaused ? '⚠️ BACKPRESSURE / LOCKED' : '✅ PIPELINE ACTIVE'}</div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsModalOpen(true)} className="bg-amber-600 px-4 py-1.5 rounded text-sm font-bold flex gap-2">
                                人工審查 <span className="bg-white text-amber-900 px-2 rounded-full">{humanQueue.length}</span>
                            </button>
                            <button onClick={() => setIsRunning(!isRunning)} className={`px-4 py-1.5 rounded text-sm font-bold ${isRunning ? 'bg-rose-600' : 'bg-emerald-600'}`}>
                                {isRunning ? '暫停' : '啟動'}
                            </button>
                        </div>
                    </header>

                    <div className="grid grid-cols-2 grid-rows-2 gap-4 h-[calc(100vh-80px)]">
                        <div className="bg-slate-900 border border-blue-900 rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-blue-950 px-3 py-2 text-sm font-bold text-blue-300 flex justify-between">
                                <span>[1] MPU 邊緣執行管線</span>
                                <span className="text-xs text-blue-400">任務進度: {taskStepRef.current}/100</span>
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar">
                                {pipelineLogs.map(log => (
                                    <div key={log.id} className="text-[10px] font-mono">
                                        <span className="text-slate-500">[{log.time}]</span> <span className="text-blue-400">{log.id}</span>
                                        <div className={`mt-1 pl-4 ${log.type !== 'normal' ? 'text-amber-400' : 'text-slate-400'}`}>{log.cmd}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-slate-900 border border-rose-900 rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-rose-950 px-3 py-2 text-sm font-bold text-rose-300">[2] MCU TrustZone-M 即時裁決 (零信任閘門)</div>
                            <div className="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar">
                                {adjudicationLogs.map((log, i) => (
                                    <div key={i} className="text-xs font-mono flex justify-between bg-slate-800/30 p-2 rounded">
                                        <span className="text-slate-300">{log.msg}</span>
                                        <span className={`font-bold ${log.status === 'O' ? 'text-emerald-500' : 'text-rose-500'}`}>[{log.status}]</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-slate-900 border border-amber-900 rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-amber-950 px-3 py-2 text-sm font-bold text-amber-300">[3] MPU 相似度即時修正 (Self-Healing)</div>
                            <div className="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar">
                                {healingLogs.map((log, i) => (
                                    <div key={i} className="text-[10px] font-mono bg-slate-800/50 p-2 rounded border border-amber-900/30">
                                        <div className="flex justify-between"><span className="text-amber-400">{log.id}</span><span className="text-emerald-400">{log.sim}</span></div>
                                        <div className="text-rose-400 line-through truncate">{log.from}</div>
                                        <div className="text-emerald-400 truncate">➔ {log.to}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-slate-900 border border-emerald-900 rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-emerald-950 px-3 py-2 text-sm font-bold text-emerald-300">[4] 不可變治理稽核帳本 (USB 實體證據鏈)</div>
                            <div className="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar">
                                {evidenceLogs.map((log, i) => (
                                    <div key={i} className="text-[10px] font-mono bg-slate-800/30 p-2 rounded border-l-2 border-emerald-500">
                                        <div className="flex justify-between text-slate-400"><span>{log.id}</span><span className="text-emerald-400">{log.action}</span></div>
                                        <div className="text-emerald-500/60 truncate">Hash: {log.hash}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
                            <div className="bg-slate-900 border-2 border-amber-500 rounded-lg w-full max-w-2xl flex flex-col">
                                <div className="bg-amber-950 px-4 py-3 border-b border-amber-900 flex justify-between items-center text-amber-400 font-bold">
                                    <span>⚠️ 任務阻塞：待決指令審查</span>
                                    <button onClick={() => setIsModalOpen(false)}>✕</button>
                                </div>
                                <div className="p-4 space-y-4">
                                    {humanQueue.length === 0 ? <div className="text-center py-10">無待處理指令</div> :
                                        humanQueue.map(item => (
                                            <div key={item.id} className="bg-slate-800 p-4 rounded space-y-3">
                                                <div className="text-xs text-blue-400 font-bold">{item.id} 任務暫停點</div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div><div className="text-[10px] text-slate-500 mb-1">攔截指令</div><div className="text-rose-400 bg-black p-2 rounded text-[10px] break-all">{item.rawCmd}</div></div>
                                                    <div><div className="text-[10px] text-emerald-500 mb-1">AI建議修復</div><div className="text-emerald-400 bg-black p-2 rounded text-[10px] break-all">{item.aiSuggestedCmd}</div></div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => processHumanAction(item, 'ALLOW')} className="flex-1 bg-emerald-700 py-2 rounded text-xs font-bold">ALLOW (採用建議)</button>
                                                    <button onClick={() => processHumanAction(item, 'DENY')} className="flex-1 bg-rose-700 py-2 rounded text-xs font-bold">DENY (廢棄任務)</button>
                                                    <button onClick={() => {const edit = prompt('手動修復指令:', item.rawCmd); if(edit) processHumanAction(item, 'MANUAL', edit)}} className="flex-1 bg-blue-700 py-2 rounded text-xs font-bold">MANUAL (手動修復)</button>
                                                </div>
                                            </div>
                                        ))
                                    }
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
