<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino-Q 企業 AI 財務執行官治理平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 柔和藍綠色系調色盤 */
        body { background-color: #f0fdfa; color: #0f172a; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f0fdfa; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #99f6e4; border-radius: 3px; }
        .panel-bg { background-color: #ffffff; border: 1px solid #ccfbf1; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .progress-bar { transition: width 0.1s linear; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isRunning, setIsRunning] = useState(true);
            const [demoSpeed, setDemoSpeed] = useState('slow'); 
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            const [currentTask, setCurrentTask] = useState({ id: 'BATCH-402', step: 0, total: 100, errors: [] });
            const [humanQueue, setHumanQueue] = useState([]); 
            const [pipelineLogs, setPipelineLogs] = useState([]);
            const [adjudicationLogs, setAdjudicationLogs] = useState([]);
            const [healingLogs, setHealingLogs] = useState([]);
            const [evidenceLogs, setEvidenceLogs] = useState([]);

            const counterRef = useRef(1000);
            const taskIDRef = useRef(402);
            const prevHashRef = useRef("00000000000000000000000000000000");

            const mockHash = (str) => {
                let hash = 0;
                for (let i = 0; i < str.length; i++) hash = (hash << 5) - hash + str.charCodeAt(i) | 0;
                return Math.abs(hash).toString(16).padStart(32, '0');
            };

            const getTime = () => new Date().toLocaleTimeString();

            // 核心流水線處理
            const tick = () => {
                if (!isRunning) return;

                setCurrentTask(prev => {
                    const nextStep = prev.step + 1;
                    const cmdID = `${prev.id}-TXN${String(nextStep).padStart(3, '0')}`;
                    const rand = Math.random();
                    let error = null;
                    let rawCmd = `{"to":"ACC-8872", "amount":12000, "ccy":"TWD"}`;

                    // 模擬 AI 金融偏移場景
                    if (rand > 0.985) {
                        error = { id: cmdID, type: 'malicious', rawCmd: `{"amount":-5000, "ccy":"TWD"}`, msg: "檢出負數轉帳(溢位異常)" };
                    } else if (rand > 0.95) {
                        error = { id: cmdID, type: 'require_human', rawCmd: `{"amount":12000, "ccy":"USD"}`, aiFixed: `{"amount":12000, "ccy":"TWD"}`, msg: "幣別推論偏移(USD限制)" };
                    } else if (rand > 0.92) {
                        error = { id: cmdID, type: 'typo', rawCmd: `{"amount":"12000", "ccy":"TWD"}`, aiFixed: `{"amount":12000, "ccy":"TWD"}`, msg: "格式校準(String->Int)" };
                    }

                    setPipelineLogs(l => [{ id: cmdID, cmd: rawCmd, type: error?.type || 'normal' }, ...l].slice(0, 30));
                    const newErrors = error ? [...prev.errors, error] : prev.errors;

                    if (nextStep >= 100) {
                        finalizeTask(prev.id, newErrors);
                        taskIDRef.current += 1;
                        return { id: `BATCH-${String(taskIDRef.current).padStart(3, '0')}`, step: 0, total: 100, errors: [] };
                    }
                    return { ...prev, step: nextStep, errors: newErrors };
                });
            };

            const finalizeTask = (taskID, errors) => {
                if (errors.length === 0) {
                    setAdjudicationLogs(l => [{ taskID, status: 'O', msg: '批次清算完成', time: getTime() }, ...l].slice(0, 50));
                    generateEvidence(taskID, 'BATCH_SUCCESS');
                } else {
                    setAdjudicationLogs(l => [{ taskID, status: '-', msg: `攔截 ${errors.length} 筆異常交易`, time: getTime() }, ...l].slice(0, 50));
                    const toAuto = errors.filter(e => e.type === 'typo');
                    const toHuman = errors.filter(e => e.type === 'require_human' || e.type === 'malicious');

                    toAuto.forEach(e => {
                        setHealingLogs(l => [{ id: e.id, from: e.rawCmd, to: e.aiFixed, sim: '自動修正編碼格式' }, ...l].slice(0, 50));
                        generateEvidence(e.id, 'AUTO_HEAL');
                    });
                    if (toHuman.length > 0) setHumanQueue(q => [...q, { taskID, errors: toHuman }]);
                }
            };

            const generateEvidence = (id, action) => {
                const currentCounter = counterRef.current++;
                const newHash = mockHash(`${id}${action}${currentCounter}${prevHashRef.current}`);
                setEvidenceLogs(prev => [{ 
                    id, time: getTime(), action, counter: currentCounter.toString(16).toUpperCase(), hash: newHash 
                }, ...prev].slice(0, 50));
                prevHashRef.current = newHash;
            };

            const handleHumanAction = (task, errorIdx, actionType, customCmd = null) => {
                const error = task.errors[errorIdx];
                if (actionType === 'ALLOW') {
                    setHealingLogs(l => [{ id: error.id, from: error.rawCmd, to: error.aiFixed, sim: '100% 風控授權' }, ...l].slice(0, 50));
                    generateEvidence(error.id, 'RISK_ALLOW');
                } else if (actionType === 'DENY') {
                    generateEvidence(error.id, 'RISK_DENY');
                } else if (actionType === 'MANUAL') {
                    setHealingLogs(l => [{ id: error.id, from: error.rawCmd, to: customCmd, sim: '100% 手動覆寫' }, ...l].slice(0, 50));
                    generateEvidence(error.id, 'MANUAL_VOID');
                }

                setHumanQueue(prev => {
                    const newQueue = prev.map(t => {
                        if (t.taskID === task.taskID) {
                            const newErrors = t.errors.filter((_, i) => i !== errorIdx);
                            return { ...t, errors: newErrors };
                        }
                        return t;
                    }).filter(t => t.errors.length > 0);
                    if (newQueue.length === 0) setIsModalOpen(false);
                    return newQueue;
                });
            };

            useEffect(() => {
                const speed = demoSpeed === 'realtime' ? 15 : 180; 
                const interval = setInterval(tick, speed);
                return () => clearInterval(interval);
            }, [isRunning, demoSpeed]);

            return (
                <div className="h-screen p-4 flex flex-col gap-4 relative">
                    <header className="flex justify-between items-center pb-2 border-b border-teal-200">
                        <div className="flex flex-col">
                            <h1 className="text-xl font-bold text-teal-800 uppercase tracking-tighter">Arduino-Q 企業 AI 財務執行官治理平台</h1>
                            <div className="flex items-center gap-4 mt-1 font-mono">
                                <div className="text-[10px] text-teal-600 font-bold">BATCH_NODE: {currentTask.id}</div>
                                <div className="w-48 h-1.5 bg-teal-100 rounded-full overflow-hidden">
                                    <div className="h-full bg-teal-500 progress-bar" style={{ width: `${currentTask.step}%` }}></div>
                                </div>
                                <div className="text-[10px] text-teal-600">{currentTask.step}/100 筆</div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="flex bg-teal-50 rounded p-1 border border-teal-100">
                                <button onClick={() => setDemoSpeed('realtime')} className={`px-3 py-1 rounded text-[10px] font-bold transition-colors ${demoSpeed === 'realtime' ? 'bg-teal-600 text-white' : 'text-teal-400'}`}>Real-time</button>
                                <button onClick={() => setDemoSpeed('slow')} className={`px-3 py-1 rounded text-[10px] font-bold transition-colors ${demoSpeed === 'slow' ? 'bg-teal-400 text-white' : 'text-teal-400'}`}>Slow-mo</button>
                            </div>
                            <button onClick={() => setIsModalOpen(true)} className="bg-white border border-rose-200 text-rose-600 px-4 py-1.5 rounded text-sm font-bold hover:bg-rose-50 transition-colors">
                                風控池 <span className="bg-rose-500 text-white px-2 rounded-full ml-1">{humanQueue.length}</span>
                            </button>
                            <button onClick={() => setIsRunning(!isRunning)} className={`px-6 py-1.5 rounded text-sm font-bold text-white transition-all ${isRunning ? 'bg-teal-700' : 'bg-emerald-600'}`}>
                                {isRunning ? '暫停管線' : '啟動防護'}
                            </button>
                        </div>
                    </header>

                    <div className="grid grid-cols-2 grid-rows-2 gap-4 h-[calc(100vh-100px)]">
                        <div className="panel-bg rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-teal-50 px-3 py-2 text-xs font-bold text-teal-700 border-b border-teal-100"> [1] AI 推論交易流 (非確定性推論)</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                                {pipelineLogs.map((log, i) => (
                                    <div key={i} className="text-[9px] font-mono flex gap-2">
                                        <span className="text-teal-400">{log.id}</span>
                                        <span className={log.type !== 'normal' ? 'text-rose-500 font-bold' : 'text-slate-400'}>{log.cmd}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="panel-bg rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-teal-50 px-3 py-2 text-xs font-bold text-teal-700 border-b border-teal-100"> [2] MCU TrustZone-M 確定性裁決</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                                {adjudicationLogs.map((log, i) => (
                                    <div key={i} className="text-[10px] font-mono flex justify-between bg-teal-50/30 p-1.5 rounded border-l-2 border-teal-500 mb-1">
                                        <span className="text-slate-600">{log.taskID}: {log.msg}</span>
                                        <span className={`font-bold ${log.status === 'O' ? 'text-teal-600' : 'text-amber-600'}`}>[{log.status}]</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="panel-bg rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-teal-50 px-3 py-2 text-xs font-bold text-teal-700 border-b border-teal-100"> [3] 邊緣端邏輯校準 (Self-Healing)</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-2 custom-scrollbar">
                                {healingLogs.map((log, i) => (
                                    <div key={i} className="text-[9px] font-mono bg-teal-50/20 p-2 rounded border border-teal-100">
                                        <div className="text-teal-600 font-bold mb-1">{log.id} | {log.sim}</div>
                                        <div className="text-rose-400 line-through truncate">{log.from}</div>
                                        <div className="text-teal-700 truncate font-bold">➔ {log.to}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="panel-bg rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-teal-50 px-3 py-2 text-xs font-bold text-teal-700 border-b border-teal-100"> [4] 不可篡改金融治理帳本 (Evidence)</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                                {evidenceLogs.map((log, i) => (
                                    <div key={i} className="text-[9px] font-mono bg-slate-50 p-2 rounded border-l-2 border-teal-500 flex flex-col">
                                        <div className="flex justify-between font-bold text-slate-700"><span>{log.id}</span><span className="text-teal-600">{log.action}</span></div>
                                        <div className="text-slate-400 truncate text-[8px]">H: {log.hash}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-50 p-6 backdrop-blur-sm">
                            <div className="bg-white rounded-xl w-full max-w-4xl flex flex-col max-h-[85vh] shadow-2xl border border-teal-100">
                                <div className="bg-teal-600 px-6 py-4 rounded-t-xl flex justify-between items-center text-white font-bold">
                                    <span className="text-lg">⚠️ 風控審查池 (Suspicious Transactions)</span>
                                    <button onClick={() => setIsModalOpen(false)} className="text-2xl hover:scale-110 transition-transform">✕</button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-6 custom-scrollbar bg-teal-50/10">
                                    {humanQueue.length === 0 ? <div className="text-center py-20 text-slate-400 italic">無待核准之異常交易</div> :
                                        humanQueue.map((task) => (
                                            <div key={task.taskID} className="bg-white rounded-lg p-4 border border-teal-100 shadow-sm">
                                                <div className="text-teal-700 font-bold mb-4 border-b border-teal-50 pb-2 flex justify-between">
                                                    <span>批次清單：{task.taskID}</span>
                                                    <span className="text-xs text-rose-500 font-bold tracking-widest animate-pulse">檢測到 {task.errors.length} 處重大風險</span>
                                                </div>
                                                <div className="space-y-4">
                                                    {task.errors.map((err, idx) => (
                                                        <div key={idx} className="grid grid-cols-12 gap-4 items-center bg-slate-50 p-3 rounded border border-slate-100">
                                                            <div className="col-span-2 text-[10px] text-slate-400 font-mono">{err.id}</div>
                                                            <div className="col-span-3">
                                                                <div className="text-[8px] text-rose-500 font-bold mb-1">異常數據</div>
                                                                <div className="text-rose-600 text-[10px] font-mono break-all line-through">{err.rawCmd}</div>
                                                            </div>
                                                            <div className="col-span-3">
                                                                <div className="text-[8px] text-teal-600 font-bold mb-1">合規建議方案</div>
                                                                <div className="text-teal-700 text-[10px] font-mono break-all font-bold">{err.aiFixed || '無法自動修正'}</div>
                                                            </div>
                                                            <div className="col-span-4 flex gap-1">
                                                                <button onClick={() => handleHumanAction(task, idx, 'ALLOW')} className="flex-1 bg-teal-600 hover:bg-teal-700 py-2 rounded text-[10px] font-bold text-white shadow-sm transition-all">APPROVE</button>
                                                                <button onClick={() => handleHumanAction(task, idx, 'DENY')} className="flex-1 bg-rose-600 hover:bg-rose-700 py-2 rounded text-[10px] font-bold text-white shadow-sm transition-all">REJECT</button>
                                                                <button onClick={() => {const edit = prompt('手動覆寫交易數據:', err.rawCmd); if(edit) handleHumanAction(task, idx, 'MANUAL', edit)}} className="flex-1 bg-slate-700 hover:bg-slate-800 py-2 rounded text-[10px] font-bold text-white shadow-sm transition-all">EDIT</button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))
                                    }
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
