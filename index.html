<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDUINO-Q 開發板 MPU邊緣運算+MCU(TrustZone-M)治理裝置平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        .progress-bar { transition: width 0.1s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isRunning, setIsRunning] = useState(true);
            const [demoSpeed, setDemoSpeed] = useState('slow'); 
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            // 任務管線狀態
            const [currentTask, setCurrentTask] = useState({ id: 'TASK-001', step: 0, total: 100, errors: [] });
            const [humanQueue, setHumanQueue] = useState([]); 
            const [pipelineLogs, setPipelineLogs] = useState([]);
            const [adjudicationLogs, setAdjudicationLogs] = useState([]);
            const [healingLogs, setHealingLogs] = useState([]);
            const [evidenceLogs, setEvidenceLogs] = useState([]);

            const counterRef = useRef(1000);
            const taskIDRef = useRef(1);
            const prevHashRef = useRef("00000000000000000000000000000000");

            const mockHash = (str) => {
                let hash = 0;
                for (let i = 0; i < str.length; i++) hash = (hash << 5) - hash + str.charCodeAt(i) | 0;
                return Math.abs(hash).toString(16).padStart(32, '0');
            };

            const getTime = () => new Date().toISOString().substring(11, 23);

            const finalizeTask = (taskID, errors) => {
                if (errors.length === 0) {
                    setAdjudicationLogs(l => [{ taskID, status: 'O', msg: '整組任務驗證通過', time: getTime() }, ...l].slice(0, 50));
                    generateEvidence(taskID, 'TASK_ALLOW');
                } else {
                    setAdjudicationLogs(l => [{ taskID, status: '-', msg: `檢出 ${errors.length} 處異常，進入異步修復`, time: getTime() }, ...l].slice(0, 50));
                    
                    const toAuto = errors.filter(e => e.type === 'typo');
                    const toHuman = errors.filter(e => e.type === 'require_human' || e.type === 'malicious');

                    toAuto.forEach(e => {
                        setHealingLogs(l => [{ id: e.id, from: e.rawCmd, to: e.aiFixed, sim: '99% 自動修正' }, ...l].slice(0, 50));
                        generateEvidence(e.id, 'AUTO_HEALED');
                    });

                    if (toHuman.length > 0) {
                        setHumanQueue(q => [...q, { taskID, errors: toHuman }]);
                    }
                }
            };

            const generateEvidence = (id, action) => {
                const currentCounter = counterRef.current++;
                const newHash = mockHash(`${id}${action}${currentCounter}${prevHashRef.current}`);
                setEvidenceLogs(prev => [{ 
                    id, time: getTime(), action, counter: currentCounter.toString(16).toUpperCase(), hash: newHash 
                }, ...prev].slice(0, 50));
                prevHashRef.current = newHash;
            };

            const tick = () => {
                if (!isRunning) return;

                setCurrentTask(prev => {
                    const nextStep = prev.step + 1;
                    const cmdID = `${prev.id}-S${String(nextStep).padStart(3, '0')}`;
                    const rand = Math.random();
                    let error = null;
                    let rawCmd = `{"task":"${prev.id}", "step":${nextStep}, "axis":"X", "speed":10}`;

                    if (rand > 0.985) {
                        error = { id: cmdID, type: 'malicious', rawCmd: `{"axis":"Z", "speed":999}`, msg: "嚴重參數越界" };
                    } else if (rand > 0.95) {
                        error = { id: cmdID, type: 'require_human', rawCmd: `{"axis":"Y", "speed":"ERROR"}`, aiFixed: `{"axis":"Y", "speed":50}`, msg: "邏輯模糊" };
                    } else if (rand > 0.91) {
                        error = { id: cmdID, type: 'typo', rawCmd: `{"axis":"Y", "speeed":20}`, aiFixed: `{"axis":"Y", "speed":20}`, msg: "語法偏移" };
                    }

                    setPipelineLogs(l => [{ id: cmdID, cmd: rawCmd, type: error?.type || 'normal' }, ...l].slice(0, 30));
                    const newErrors = error ? [...prev.errors, error] : prev.errors;

                    if (nextStep >= 100) {
                        finalizeTask(prev.id, newErrors);
                        taskIDRef.current += 1;
                        return { id: `TASK-${String(taskIDRef.current).padStart(3, '0')}`, step: 0, total: 100, errors: [] };
                    }
                    return { ...prev, step: nextStep, errors: newErrors };
                });
            };

            const handleHumanAction = (task, errorIdx, actionType, customCmd = null) => {
                const error = task.errors[errorIdx];
                if (actionType === 'ALLOW') {
                    setHealingLogs(l => [{ id: error.id, from: error.rawCmd, to: error.aiFixed, sim: '100% 人工核准' }, ...l].slice(0, 50));
                    generateEvidence(error.id, 'HUMAN_ALLOW');
                } else if (actionType === 'DENY') {
                    generateEvidence(error.id, 'HUMAN_DENY');
                } else if (actionType === 'MANUAL') {
                    setHealingLogs(l => [{ id: error.id, from: error.rawCmd, to: customCmd, sim: '100% 手動覆寫' }, ...l].slice(0, 50));
                    generateEvidence(error.id, 'MANUAL_OVERRIDE');
                }

                setHumanQueue(prev => {
                    const newQueue = prev.map(t => {
                        if (t.taskID === task.taskID) {
                            const newErrors = t.errors.filter((_, i) => i !== errorIdx);
                            return { ...t, errors: newErrors };
                        }
                        return t;
                    }).filter(t => t.errors.length > 0);
                    if (newQueue.length === 0) setIsModalOpen(false);
                    return newQueue;
                });
            };

            useEffect(() => {
                const speed = demoSpeed === 'realtime' ? 20 : 150; 
                const interval = setInterval(tick, speed);
                return () => clearInterval(interval);
            }, [isRunning, demoSpeed]);

            return (
                <div className="h-screen p-4 flex flex-col gap-4 relative">
                    <header className="flex justify-between items-center pb-2 border-b border-slate-700">
                        <div className="flex flex-col">
                            <h1 className="text-xl font-bold text-cyan-400 uppercase tracking-tighter">Arduino-Q 治理流水線展示平台</h1>
                            <div className="flex items-center gap-4 mt-1 font-mono">
                                <div className="text-[10px] text-slate-400">NODE: <span className="text-emerald-400">{currentTask.id}</span></div>
                                <div className="w-48 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                    <div className="h-full bg-cyan-500 progress-bar" style={{ width: `${currentTask.step}%` }}></div>
                                </div>
                                <div className="text-[10px] text-slate-400">{currentTask.step}/100</div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="flex bg-slate-800 rounded p-1 border border-slate-700">
                                <button onClick={() => setDemoSpeed('realtime')} className={`px-3 py-1 rounded text-[10px] font-bold transition-colors ${demoSpeed === 'realtime' ? 'bg-cyan-600 text-white' : 'text-slate-500'}`}>Real-time</button>
                                <button onClick={() => setDemoSpeed('slow')} className={`px-3 py-1 rounded text-[10px] font-bold transition-colors ${demoSpeed === 'slow' ? 'bg-amber-600 text-white' : 'text-slate-500'}`}>Slow-mo</button>
                            </div>
                            <button onClick={() => setIsModalOpen(true)} className="bg-rose-600/20 border border-rose-500 text-rose-500 px-4 py-1.5 rounded text-sm font-bold">
                                異常池 <span className="bg-rose-500 text-white px-2 rounded-full ml-1">{humanQueue.length}</span>
                            </button>
                            <button onClick={() => setIsRunning(!isRunning)} className={`px-4 py-1.5 rounded text-sm font-bold ${isRunning ? 'bg-slate-700' : 'bg-emerald-600'}`}>
                                {isRunning ? '暫停' : '啟動'}
                            </button>
                        </div>
                    </header>

                    <div className="grid grid-cols-2 grid-rows-2 gap-4 h-[calc(100vh-100px)]">
                        <div className="bg-slate-900 border border-blue-900 rounded-lg flex flex-col overflow-hidden shadow-2xl">
                            <div className="bg-blue-950 px-3 py-2 text-xs font-bold text-blue-300"> [1] MPU 推論指令流 (即時校驗)</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                                {pipelineLogs.map((log, i) => (
                                    <div key={i} className="text-[9px] font-mono flex gap-2">
                                        <span className="text-blue-500">{log.id}</span>
                                        <span className={log.type !== 'normal' ? 'text-amber-400 font-bold' : 'text-slate-500'}>{log.cmd}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-slate-900 border border-rose-900 rounded-lg flex flex-col overflow-hidden shadow-2xl">
                            <div className="bg-rose-950 px-3 py-2 text-xs font-bold text-rose-300"> [2] MCU 任務組裁決報告 (非阻塞)</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                                {adjudicationLogs.map((log, i) => (
                                    <div key={i} className="text-[10px] font-mono flex justify-between bg-slate-800/30 p-1.5 rounded border-l-2 border-rose-500">
                                        <span className="text-slate-300">{log.taskID}: {log.msg}</span>
                                        <span className={`font-bold ${log.status === 'O' ? 'text-emerald-500' : 'text-amber-500'}`}>[{log.status}]</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-slate-900 border border-amber-900 rounded-lg flex flex-col overflow-hidden shadow-2xl">
                            <div className="bg-amber-950 px-3 py-2 text-xs font-bold text-amber-300"> [3] 邊緣自動修復中心 (Self-Healing)</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-2 custom-scrollbar">
                                {healingLogs.map((log, i) => (
                                    <div key={i} className="text-[9px] font-mono bg-slate-800/50 p-2 rounded border border-amber-900/30">
                                        <div className="text-amber-400 mb-1">{log.id} | {log.sim}</div>
                                        <div className="text-rose-400 line-through truncate">{log.from}</div>
                                        <div className="text-emerald-400 truncate">➔ {log.to}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-slate-900 border border-emerald-900 rounded-lg flex flex-col overflow-hidden shadow-2xl">
                            <div className="bg-emerald-950 px-3 py-2 text-xs font-bold text-emerald-300"> [4] 治理證據鏈 (USB 實體同步)</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                                {evidenceLogs.map((log, i) => (
                                    <div key={i} className="text-[9px] font-mono bg-slate-800/30 p-2 rounded border-l-2 border-emerald-500 flex flex-col">
                                        <div className="flex justify-between font-bold"><span>{log.id}</span><span className="text-emerald-400">{log.action}</span></div>
                                        <div className="text-emerald-900/80 truncate text-[8px]">H: {log.hash}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-6">
                            <div className="bg-slate-900 border-2 border-amber-500 rounded-xl w-full max-w-4xl flex flex-col max-h-[85vh] shadow-2xl">
                                <div className="bg-amber-950 px-6 py-4 border-b border-amber-900 flex justify-between items-center text-amber-400 font-bold">
                                    <span className="text-lg">異步待處理任務池 (Pending Pool)</span>
                                    <button onClick={() => setIsModalOpen(false)} className="text-2xl hover:text-white transition-colors">✕</button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-6 custom-scrollbar">
                                    {humanQueue.length === 0 ? <div className="text-center py-20 text-slate-500 italic">目前無待處理異常</div> :
                                        humanQueue.map((task) => (
                                            <div key={task.taskID} className="bg-slate-800 rounded-lg p-4 border border-slate-700">
                                                <div className="text-blue-400 font-bold mb-4 border-b border-slate-700 pb-2">任務：{task.taskID}</div>
                                                <div className="space-y-4">
                                                    {task.errors.map((err, idx) => (
                                                        <div key={idx} className="grid grid-cols-12 gap-4 items-center bg-slate-900/50 p-3 rounded border border-rose-900/20">
                                                            <div className="col-span-2 text-[10px] text-slate-500 font-mono">{err.id}</div>
                                                            <div className="col-span-3"><div className="text-rose-400 text-[10px] font-mono break-all line-through">{err.rawCmd}</div></div>
                                                            <div className="col-span-3"><div className="text-emerald-400 text-[10px] font-mono break-all">{err.aiFixed || 'N/A'}</div></div>
                                                            <div className="col-span-4 flex gap-1">
                                                                <button onClick={() => handleHumanAction(task, idx, 'ALLOW')} className="flex-1 bg-emerald-700 hover:bg-emerald-600 py-1.5 rounded text-[10px] font-bold text-white transition-colors">ALLOW</button>
                                                                <button onClick={() => handleHumanAction(task, idx, 'DENY')} className="flex-1 bg-rose-700 hover:bg-rose-600 py-1.5 rounded text-[10px] font-bold text-white transition-colors">DENY</button>
                                                                <button onClick={() => {const edit = prompt('手動修復:', err.rawCmd); if(edit) handleHumanAction(task, idx, 'MANUAL', edit)}} className="flex-1 bg-blue-700 hover:bg-blue-600 py-1.5 rounded text-[10px] font-bold text-white transition-colors">EDIT</button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))
                                    }
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
