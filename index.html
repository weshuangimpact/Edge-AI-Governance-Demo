<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDUINO-Q 開發板 MPU邊緣運算+MCU(TrustZone-M)治理裝置平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isRunning, setIsRunning] = useState(true);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [humanQueue, setHumanQueue] = useState([]);
            
            const [pipelineLogs, setPipelineLogs] = useState([]);
            const [adjudicationLogs, setAdjudicationLogs] = useState([]);
            const [healingLogs, setHealingLogs] = useState([]);
            const [evidenceLogs, setEvidenceLogs] = useState([]);
            
            const counterRef = useRef(1000);
            const prevHashRef = useRef("00000000000000000000000000000000");

            const mockHash = (str) => {
                let hash = 0;
                for (let i = 0; i < str.length; i++) hash = (hash << 5) - hash + str.charCodeAt(i) | 0;
                return Math.abs(hash).toString(16).padStart(32, '0');
            };

            const getTime = () => new Date().toISOString().substring(11, 23);

            const triggerEvent = () => {
                const id = `CMD-${Math.floor(Math.random() * 10000).toString().padStart(4, '0')}`;
                const rand = Math.random();
                let eventType = 'normal';
                let rawCmd = '{"axis":"X", "speed": 10}';
                let fixedCmd = '';
                
                if (rand > 0.85) {
                    eventType = 'malicious';
                    rawCmd = '{"axis":"Z", "speed": 999, "override": true}';
                } else if (rand > 0.70) {
                    eventType = 'require_human';
                    rawCmd = '{"axis":"Y", "speed": "fast", "auth": null}'; 
                    // 產生一個 AI 建議的修復指令
                    fixedCmd = '{"axis":"Y", "speed": 50, "auth": "SYSTEM_DEFAULT"}';
                } else if (rand > 0.50) {
                    eventType = 'typo';
                    rawCmd = '{"axis":"Y", "speeed": 20}';
                    fixedCmd = '{"axis":"Y", "speed": 20}';
                }

                // 1. 執行管線 (MPU 邊緣生成)
                setPipelineLogs(prev => [{ id, time: getTime(), cmd: rawCmd, type: eventType }, ...prev].slice(0, 50));

                setTimeout(() => {
                    // 2. 即時判定 (MCU TrustZone-M)
                    if (eventType === 'normal') {
                        setAdjudicationLogs(prev => [{ id, time: getTime(), status: 'O', msg: '完全合規' }, ...prev].slice(0, 50));
                        generateEvidence(id, 'ALLOW');
                    } else if (eventType === 'malicious') {
                        setAdjudicationLogs(prev => [{ id, time: getTime(), status: 'X', msg: '參數越界/惡意指令' }, ...prev].slice(0, 50));
                        generateEvidence(id, 'DENY');
                    } else if (eventType === 'typo') {
                        setAdjudicationLogs(prev => [{ id, time: getTime(), status: '-', msg: '語法微小異常 (Pending)' }, ...prev].slice(0, 50));
                        
                        setTimeout(() => {
                            // 3. 即時修正 (MPU 邊緣自動結構修復 > 98%)
                            setHealingLogs(prev => [{ id, time: getTime(), from: rawCmd, to: fixedCmd, sim: '98% 自動修復' }, ...prev].slice(0, 50));
                            
                            setTimeout(() => {
                                setAdjudicationLogs(prev => [{ id, time: getTime(), status: 'O', msg: '邊緣修復後合規放行' }, ...prev].slice(0, 50));
                                generateEvidence(id, 'ALLOW_HEALED');
                            }, 400);
                        }, 600);
                    } else if (eventType === 'require_human') {
                        // 轉入人工審查佇列
                        setAdjudicationLogs(prev => [{ id, time: getTime(), status: '-', msg: '邏輯異常，維持實體鎖定 (Pending)' }, ...prev].slice(0, 50));
                        setHumanQueue(prev => [{ id, time: getTime(), rawCmd, aiSuggestedCmd: fixedCmd }, ...prev]);
                    }
                }, 300);
            };

            const generateEvidence = (id, action) => {
                const currentCounter = counterRef.current++;
                const newHash = mockHash(`${id}${action}${currentCounter}${prevHashRef.current}`);
                setEvidenceLogs(prev => [{ 
                    id, 
                    time: getTime(), 
                    action, 
                    counter: currentCounter.toString(16).toUpperCase(), 
                    hash: newHash 
                }, ...prev].slice(0, 50));
                prevHashRef.current = newHash;
            };

            const processHumanAction = (item, actionType, customCmd = null) => {
                // 從待審查佇列移除
                setHumanQueue(prev => prev.filter(q => q.id !== item.id));
                
                if (actionType === 'ALLOW') {
                    // 使用 AI 建議的修復指令
                    const finalCmd = item.aiSuggestedCmd;
                    setHealingLogs(prev => [{ id: item.id, time: getTime(), from: item.rawCmd, to: finalCmd, sim: '100% 人工核准(採用AI建議)' }, ...prev].slice(0, 50));
                    setTimeout(() => {
                        setAdjudicationLogs(prev => [{ id: item.id, time: getTime(), status: 'O', msg: '人工審查修正後合規放行' }, ...prev].slice(0, 50));
                        generateEvidence(item.id, 'ALLOW_HUMAN_HEALED');
                    }, 400);
                } 
                else if (actionType === 'DENY') {
                    // 直接廢棄
                    setTimeout(() => {
                        setAdjudicationLogs(prev => [{ id: item.id, time: getTime(), status: 'X', msg: '人工審查拒絕，強制廢棄' }, ...prev].slice(0, 50));
                        generateEvidence(item.id, 'DENY_HUMAN_REJECTED');
                    }, 400);
                }
                else if (actionType === 'MANUAL') {
                    // 使用工程師手打的指令
                    const finalCmd = customCmd || item.rawCmd;
                    setHealingLogs(prev => [{ id: item.id, time: getTime(), from: item.rawCmd, to: finalCmd, sim: '100% 工程師手動覆寫' }, ...prev].slice(0, 50));
                    setTimeout(() => {
                        setAdjudicationLogs(prev => [{ id: item.id, time: getTime(), status: 'O', msg: '手動覆寫後合規放行' }, ...prev].slice(0, 50));
                        generateEvidence(item.id, 'ALLOW_MANUAL_OVERRIDE');
                    }, 400);
                }
                
                if(humanQueue.length <= 1) setIsModalOpen(false);
            };

            const handleManualEdit = (item) => {
                // 使用原生的 prompt 作為次級輸入視窗
                const userInput = prompt(`手動編輯指令 (${item.id}):\n請輸入修復後的 JSON 格式指令:`, item.rawCmd);
                if (userInput !== null) {
                    processHumanAction(item, 'MANUAL', userInput);
                }
            };

            useEffect(() => {
                if (!isRunning) return;
                const interval = setInterval(triggerEvent, 1200);
                return () => clearInterval(interval);
            }, [isRunning]);

            return (
                <div className="h-screen p-4 flex flex-col gap-4 relative">
                    <header className="flex justify-between items-center pb-2 border-b border-slate-700">
                        <h1 className="text-xl font-bold text-cyan-400 tracking-wider">
                            ARDUINO-Q 開發板 MPU邊緣運算+MCU(TrustZone-M)治理裝置平台
                        </h1>
                        <div className="flex items-center gap-4">
                            <button 
                                onClick={() => setIsModalOpen(true)} 
                                className="bg-amber-600 hover:bg-amber-500 transition-colors px-4 py-1.5 rounded text-sm font-bold flex items-center gap-2 shadow-lg"
                            >
                                人工審查作業
                                <span className="bg-white text-amber-900 px-2 py-0.5 rounded-full text-xs font-black">
                                    {humanQueue.length}
                                </span>
                            </button>
                            
                            <button 
                                onClick={() => setIsRunning(!isRunning)} 
                                className={`px-4 py-1.5 rounded text-sm font-bold ${isRunning ? 'bg-rose-600' : 'bg-emerald-600'}`}
                            >
                                {isRunning ? '暫停展示' : '啟動展示'}
                            </button>
                        </div>
                    </header>

                    <div className="grid grid-cols-2 grid-rows-2 gap-4 h-[calc(100vh-80px)]">
                        
                        {/* 1. 執行管線 */}
                        <div className="bg-slate-900 border border-blue-900 rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-blue-950 px-3 py-2 border-b border-blue-900 text-sm font-bold text-blue-300">
                                [1] MPU 邊緣執行管線 (原始推論事件流)
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 custom-scrollbar space-y-2">
                                {pipelineLogs.map(log => (
                                    <div key={log.id+log.type} className="text-xs font-mono">
                                        <span className="text-slate-500">[{log.time}]</span> 
                                        <span className="text-blue-400 ml-2">{log.id}</span>
                                        <div className={`mt-1 pl-4 ${log.type === 'malicious' ? 'text-rose-400' : log.type === 'require_human' ? 'text-amber-400' : log.type === 'typo' ? 'text-purple-400' : 'text-slate-300'}`}>
                                            {log.cmd}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 2. 即時判定 */}
                        <div className="bg-slate-900 border border-rose-900 rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-rose-950 px-3 py-2 border-b border-rose-900 text-sm font-bold text-rose-300">
                                [2] MCU TrustZone-M 即時裁決 (零信任硬體閘門)
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 custom-scrollbar space-y-2">
                                {adjudicationLogs.map((log, i) => (
                                    <div key={i} className="text-xs font-mono flex items-center justify-between bg-slate-800/50 p-2 rounded">
                                        <div>
                                            <span className="text-slate-500">[{log.time}]</span>
                                            <span className="text-rose-300 ml-2">{log.id}</span>
                                            <span className="text-slate-300 ml-3">{log.msg}</span>
                                        </div>
                                        <div className={`text-lg font-bold ${log.status === 'O' ? 'text-emerald-500' : log.status === 'X' ? 'text-rose-500' : 'text-amber-500'}`}>
                                            [{log.status}]
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 3. 即時修正 */}
                        <div className="bg-slate-900 border border-amber-900 rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-amber-950 px-3 py-2 border-b border-amber-900 text-sm font-bold text-amber-300">
                                [3] MPU 相似度即時修正 (Self-Healing)
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 custom-scrollbar space-y-2">
                                {healingLogs.map((log, i) => (
                                    <div key={i} className="text-xs font-mono bg-slate-800/50 p-2 rounded border border-amber-900/50">
                                        <div className="flex justify-between mb-1">
                                            <span className="text-amber-400">{log.id}</span>
                                            <span className="text-emerald-400">{log.sim}</span>
                                        </div>
                                        <div className="text-rose-400 line-through">{log.from}</div>
                                        <div className="text-emerald-400 mt-1">➔ {log.to}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 4. 證據鏈 */}
                        <div className="bg-slate-900 border border-emerald-900 rounded-lg flex flex-col overflow-hidden">
                            <div className="bg-emerald-950 px-3 py-2 border-b border-emerald-900 text-sm font-bold text-emerald-300">
                                [4] 不可變治理稽核帳本 (USB 實體證據鏈)
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 custom-scrollbar space-y-2">
                                {evidenceLogs.map((log, i) => (
                                    <div key={i} className="text-xs font-mono bg-slate-800/30 p-2 rounded border-l-2 border-emerald-500">
                                        <div className="flex justify-between text-slate-400 mb-1">
                                            <span>{log.id} | CTR: 0x{log.counter}</span>
                                            <span className={log.action.includes('ALLOW') ? 'text-emerald-400' : 'text-rose-400'}>{log.action}</span>
                                        </div>
                                        <div className="text-emerald-500/80 truncate">Hash: {log.hash}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                    </div>

                    {/* 人工審查 Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                            <div className="bg-slate-900 border-2 border-amber-500 rounded-lg w-full max-w-2xl flex flex-col max-h-[80vh] shadow-2xl">
                                <div className="bg-amber-950 px-4 py-3 border-b border-amber-900 flex justify-between items-center">
                                    <h2 className="text-amber-400 font-bold text-lg flex items-center gap-2">
                                        ⚠️ 待決指令人工審查佇列 (Pending Queue)
                                    </h2>
                                    <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-white font-bold text-xl">✕</button>
                                </div>
                                <div className="p-4 overflow-y-auto flex-1 space-y-4 custom-scrollbar">
                                    {humanQueue.length === 0 ? 
                                        <div className="text-slate-500 text-center py-10 font-mono">✅ 目前無待審查之例外指令</div> 
                                    :
                                        humanQueue.map(item => (
                                            <div key={item.id} className="bg-slate-800 p-4 rounded border border-slate-700 shadow-inner">
                                                <div className="flex justify-between items-center mb-3 border-b border-slate-700 pb-2">
                                                    <span className="text-blue-400 font-mono font-bold text-sm">{item.id}</span>
                                                    <span className="text-slate-400 text-xs font-mono">{item.time}</span>
                                                </div>
                                                
                                                <div className="grid grid-cols-2 gap-4 mb-4">
                                                    <div>
                                                        <div className="text-xs text-slate-400 mb-1">1. 攔截之原始推論指令：</div>
                                                        <div className="text-rose-400 font-mono text-xs bg-slate-900 p-2 rounded border border-rose-900/50 break-words line-through">
                                                            {item.rawCmd}
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <div className="text-xs text-emerald-400 mb-1">2. AI自動建議修復後指令：</div>
                                                        <div className="text-emerald-300 font-mono text-xs bg-emerald-950/30 p-2 rounded border border-emerald-900/50 break-words">
                                                            {item.aiSuggestedCmd}
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                <div className="flex gap-2">
                                                    <button 
                                                        onClick={() => processHumanAction(item, 'ALLOW')} 
                                                        className="flex-1 bg-emerald-700 hover:bg-emerald-600 py-2 rounded text-sm font-bold transition-colors text-white"
                                                    >
                                                        ALLOW (採用建議)
                                                    </button>
                                                    <button 
                                                        onClick={() => processHumanAction(item, 'DENY')} 
                                                        className="flex-1 bg-rose-700 hover:bg-rose-600 py-2 rounded text-sm font-bold transition-colors text-white"
                                                    >
                                                        DENY (直接廢棄)
                                                    </button>
                                                    <button 
                                                        onClick={() => handleManualEdit(item)} 
                                                        className="flex-1 bg-blue-700 hover:bg-blue-600 py-2 rounded text-sm font-bold transition-colors text-white"
                                                    >
                                                        手動修復 (MANUAL)
                                                    </button>
                                                </div>
                                            </div>
                                        ))
                                    }
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
