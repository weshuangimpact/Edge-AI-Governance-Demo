<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino-Q 企業 AI 財務執行官治理平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 柔和藍綠色系調色盤 */
        body { 
            background-color: #f0fdfa; 
            color: #0f172a; 
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace; 
            overflow: hidden; 
            font-size: 16px; /* 提升基礎字體 */
        }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f0fdfa; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #99f6e4; border-radius: 4px; }
        .panel-bg { background-color: #ffffff; border: 2px solid #ccfbf1; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .progress-bar { transition: width 0.05s linear; }
        
        /* 動態強調效果 */
        .log-entry { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isRunning, setIsRunning] = useState(true);
            const [demoSpeed, setDemoSpeed] = useState('slow'); 
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            // 交易狀態
            const [humanQueue, setHumanQueue] = useState([]); 
            const [pipelineLogs, setPipelineLogs] = useState([]);
            const [adjudicationLogs, setAdjudicationLogs] = useState([]);
            const [healingLogs, setHealingLogs] = useState([]);
            const [evidenceLogs, setEvidenceLogs] = useState([]);

            const counterRef = useRef(500120); // 模擬轉帳序號
            const prevHashRef = useRef("00000000000000000000000000000000");

            const mockHash = (str) => {
                let hash = 0;
                for (let i = 0; i < str.length; i++) hash = (hash << 5) - hash + str.charCodeAt(i) | 0;
                return Math.abs(hash).toString(16).padStart(32, '0');
            };

            const getTime = () => new Date().toLocaleTimeString('zh-TW', { hour12: false });

            // 單筆原子化裁決邏輯
            const tick = () => {
                if (!isRunning) return;

                const txnID = `TXN-${counterRef.current}`;
                const rand = Math.random();
                let error = null;
                let rawCmd = `{"to":"ACC-8872", "amount":25000, "ccy":"TWD"}`;

                // 模擬 AI 推論偏移場景
                if (rand > 0.98) {
                    error = { id: txnID, type: 'malicious', rawCmd: `{"amount":-1000, "ccy":"TWD"}`, msg: "嚴重：檢出負數轉帳" };
                } else if (rand > 0.94) {
                    error = { id: txnID, type: 'require_human', rawCmd: `{"amount":25000, "ccy":"USD"}`, aiFixed: `{"amount":25000, "ccy":"TWD"}`, msg: "疑義：幣別偏移(USD限制)" };
                } else if (rand > 0.90) {
                    error = { id: txnID, type: 'typo', rawCmd: `{"amount":"25000", "ccy":"TWD"}`, aiFixed: `{"amount":25000, "ccy":"TWD"}`, msg: "偏移：格式型別錯誤" };
                }

                // 1. MPU 推論階段紀錄
                setPipelineLogs(l => [{ id: txnID, cmd: rawCmd, type: error?.type || 'normal', time: getTime() }, ...l].slice(0, 20));

                // 2. MCU 即時裁決 (單筆處理)
                setTimeout(() => {
                    if (!error) {
                        setAdjudicationLogs(l => [{ id: txnID, status: 'O', msg: '裁決：合規准予執行', time: getTime() }, ...l].slice(0, 20));
                        generateEvidence(txnID, 'TXN_ALLOW');
                    } else if (error.type === 'typo') {
                        setAdjudicationLogs(l => [{ id: txnID, status: '-', msg: '檢測偏移：啟動自動校準', time: getTime() }, ...l].slice(0, 20));
                        setHealingLogs(l => [{ id: txnID, from: error.rawCmd, to: error.aiFixed, sim: '99% 格式校準' }, ...l].slice(0, 20));
                        generateEvidence(txnID, 'AUTO_HEAL');
                    } else {
                        // 惡意或需人工審查：進入異常池，不影響後續交易
                        setAdjudicationLogs(l => [{ id: txnID, status: 'X', msg: error.msg, time: getTime() }, ...l].slice(0, 20));
                        setHumanQueue(q => [...q, { id: txnID, error, time: getTime() }]);
                        generateEvidence(txnID, error.type === 'malicious' ? 'HARD_BLOCK' : 'PENDING_REVIEW');
                    }
                }, 50);

                counterRef.current += 1;
            };

            const generateEvidence = (id, action) => {
                const newHash = mockHash(`${id}${action}${prevHashRef.current}`);
                setEvidenceLogs(prev => [{ 
                    id, time: getTime(), action, hash: newHash 
                }, ...prev].slice(0, 30));
                prevHashRef.current = newHash;
            };

            const handleHumanAction = (task, actionType, customCmd = null) => {
                if (actionType === 'ALLOW') {
                    setHealingLogs(l => [{ id: task.id, from: task.error.rawCmd, to: task.error.aiFixed, sim: '100% 人工授權' }, ...l].slice(0, 20));
                    generateEvidence(task.id, 'MANUAL_ALLOW');
                } else if (actionType === 'DENY') {
                    generateEvidence(task.id, 'MANUAL_REJECT');
                } else if (actionType === 'MANUAL') {
                    setHealingLogs(l => [{ id: task.id, from: task.error.rawCmd, to: customCmd, sim: '100% 手動覆寫' }, ...l].slice(0, 20));
                    generateEvidence(task.id, 'MANUAL_OVERRIDE');
                }
                setHumanQueue(prev => prev.filter(t => t.id !== task.id));
                if (humanQueue.length <= 1) setIsModalOpen(false);
            };

            useEffect(() => {
                const speed = demoSpeed === 'realtime' ? 100 : 1000; 
                const interval = setInterval(tick, speed);
                return () => clearInterval(interval);
            }, [isRunning, demoSpeed]);

            return (
                <div className="h-screen p-6 flex flex-col gap-6 relative">
                    <header className="flex justify-between items-center pb-4 border-b-2 border-teal-200">
                        <div className="flex flex-col">
                            <h1 className="text-3xl font-black text-teal-900 uppercase tracking-tighter">ARDUINO-Q 開發板 MPU邊緣運算+MCU(TrustZone-M) 金融執行官治理平台</h1>
                            <div className="flex items-center gap-4 mt-2 font-mono">
                                <span className="px-3 py-1 bg-teal-800 text-white text-sm rounded">單筆原子化裁決模式 ACTIVE</span>
                                <span className="text-teal-600 font-bold text-lg">系統時間: {getTime()}</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex bg-teal-100 rounded-lg p-1 border-2 border-teal-200 shadow-inner">
                                <button onClick={() => setDemoSpeed('realtime')} className={`px-6 py-2 rounded-md text-sm font-black transition-all ${demoSpeed === 'realtime' ? 'bg-teal-600 text-white shadow-md' : 'text-teal-500'}`}>實時傳輸</button>
                                <button onClick={() => setDemoSpeed('slow')} className={`px-6 py-2 rounded-md text-sm font-black transition-all ${demoSpeed === 'slow' ? 'bg-amber-600 text-white shadow-md' : 'text-teal-500'}`}>降速展示</button>
                            </div>
                            <button onClick={() => setIsModalOpen(true)} className="bg-white border-2 border-rose-300 text-rose-600 px-6 py-2.5 rounded-lg text-lg font-black hover:bg-rose-50 transition-all shadow-lg">
                                風控池 <span className="bg-rose-600 text-white px-3 py-0.5 rounded-full ml-2">{humanQueue.length}</span>
                            </button>
                            <button onClick={() => setIsRunning(!isRunning)} className={`px-8 py-2.5 rounded-lg text-lg font-black text-white shadow-xl transition-all ${isRunning ? 'bg-teal-800' : 'bg-emerald-600'}`}>
                                {isRunning ? '暫停管線' : '啟動防護'}
                            </button>
                        </div>
                    </header>

                    <div className="grid grid-cols-2 grid-rows-2 gap-6 flex-1 overflow-hidden">
                        {/* 1. MPU 邊緣執行管線 */}
                        <div className="panel-bg rounded-xl flex flex-col overflow-hidden">
                            <div className="bg-teal-800 px-4 py-3 text-lg font-black text-white flex justify-between">
                                <span>[1] MPU 推論交易流 (非確定性)</span>
                                <span className="animate-pulse">● 推論中</span>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar">
                                {pipelineLogs.map((log, i) => (
                                    <div key={i} className="log-entry text-base font-mono flex gap-4 border-b border-teal-50 pb-1">
                                        <span className="text-teal-500 font-bold w-32">[{log.time}]</span>
                                        <span className="text-teal-800 font-bold w-32">{log.id}</span>
                                        <span className={log.type !== 'normal' ? 'text-rose-600 font-black' : 'text-slate-500'}>{log.cmd}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 2. MCU 即時裁決 */}
                        <div className="panel-bg rounded-xl flex flex-col overflow-hidden">
                            <div className="bg-teal-700 px-4 py-3 text-lg font-black text-white"> [2] MCU TrustZone-M 即時裁決 (單筆強制)</div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar">
                                {adjudicationLogs.map((log, i) => (
                                    <div key={i} className="log-entry text-base font-mono flex justify-between bg-teal-50/50 p-3 rounded-lg border-l-4 border-teal-500 mb-2">
                                        <span className="text-slate-700 font-bold"><span className="text-teal-600 mr-2">{log.id}</span> {log.msg}</span>
                                        <span className={`font-black text-xl ${log.status === 'O' ? 'text-teal-600' : 'text-amber-600'}`}>[{log.status}]</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 3. 邏輯校準 */}
                        <div className="panel-bg rounded-xl flex flex-col overflow-hidden">
                            <div className="bg-teal-600 px-4 py-3 text-lg font-black text-white"> [3] 邊緣自動修復中心 (Self-Healing)</div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                                {healingLogs.map((log, i) => (
                                    <div key={i} className="log-entry text-sm font-mono bg-teal-50 p-4 rounded-lg border-2 border-teal-100 shadow-sm">
                                        <div className="text-teal-700 font-black text-base mb-2">{log.id} | {log.sim}</div>
                                        <div className="text-rose-400 line-through truncate opacity-70">{log.from}</div>
                                        <div className="text-teal-800 truncate font-black text-base">修正方案 ➔ {log.to}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 4. 證據帳本 */}
                        <div className="panel-bg rounded-xl flex flex-col overflow-hidden">
                            <div className="bg-teal-900 px-4 py-3 text-lg font-black text-white"> [4] 不可篡改治理帳本 (Hardware Evidence)</div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar">
                                {evidenceLogs.map((log, i) => (
                                    <div key={i} className="log-entry text-sm font-mono bg-slate-50 p-3 rounded-lg border-l-4 border-teal-900 flex flex-col shadow-sm">
                                        <div className="flex justify-between font-black text-slate-800 text-base">
                                            <span>{log.id}</span>
                                            <span className="text-teal-700">{log.action}</span>
                                        </div>
                                        <div className="text-slate-400 truncate text-xs mt-1">SECURE_HASH: {log.hash}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* 人工審查 Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 p-10 backdrop-blur-md">
                            <div className="bg-white rounded-2xl w-full max-w-6xl flex flex-col max-h-[90vh] shadow-[0_35px_60px_-15px_rgba(0,0,0,0.5)] border-4 border-teal-600">
                                <div className="bg-teal-600 px-8 py-6 rounded-t-xl flex justify-between items-center text-white font-black">
                                    <span className="text-2xl">⚠️ 異步風控審查池 (Pending Adjudication)</span>
                                    <button onClick={() => setIsModalOpen(false)} className="text-4xl hover:scale-125 transition-transform">✕</button>
                                </div>
                                <div className="p-8 overflow-y-auto space-y-8 custom-scrollbar bg-teal-50/20">
                                    {humanQueue.length === 0 ? <div className="text-center py-32 text-slate-400 text-2xl italic font-bold">目前系統運行正常，無異常攔截筆數</div> :
                                        humanQueue.map((task) => (
                                            <div key={task.id} className="bg-white rounded-xl p-6 border-2 border-teal-100 shadow-md">
                                                <div className="text-teal-800 font-black text-xl mb-6 border-b-2 border-teal-50 pb-3 flex justify-between">
                                                    <span>交易單號：{task.id}</span>
                                                    <span className="text-rose-600 animate-pulse">檢測到重大風險行為</span>
                                                </div>
                                                <div className="grid grid-cols-12 gap-8 items-center bg-slate-50 p-6 rounded-xl border-2 border-slate-100">
                                                    <div className="col-span-3">
                                                        <div className="text-xs text-rose-500 font-black mb-2 uppercase">AI 原始偏移指令</div>
                                                        <div className="text-rose-700 text-lg font-bold font-mono break-all line-through bg-rose-50 p-3 rounded-lg border border-rose-100">
                                                            {task.error.rawCmd}
                                                        </div>
                                                    </div>
                                                    <div className="col-span-3">
                                                        <div className="text-xs text-teal-600 font-black mb-2 uppercase">系統合規修正建議</div>
                                                        <div className="text-teal-800 text-lg font-bold font-mono break-all bg-teal-50 p-3 rounded-lg border border-teal-100">
                                                            {task.error.aiFixed || '無法自動校準'}
                                                        </div>
                                                    </div>
                                                    <div className="col-span-2 text-center">
                                                        <div className="text-xs text-slate-400 font-black mb-2 uppercase">攔截時間</div>
                                                        <div className="text-slate-600 font-bold">{task.time}</div>
                                                    </div>
                                                    <div className="col-span-4 flex gap-2">
                                                        <button onClick={() => handleHumanAction(task, 'ALLOW')} className="flex-1 bg-teal-600 hover:bg-teal-700 py-4 rounded-xl text-lg font-black text-white shadow-lg active:scale-95 transition-all">核准放行</button>
                                                        <button onClick={() => handleHumanAction(task, 'DENY')} className="flex-1 bg-rose-600 hover:bg-rose-700 py-4 rounded-xl text-lg font-black text-white shadow-lg active:scale-95 transition-all">永久阻斷</button>
                                                        <button onClick={() => {const edit = prompt('手動覆寫交易數據:', task.error.rawCmd); if(edit) handleHumanAction(task, 'MANUAL', edit)}} className="flex-1 bg-slate-700 hover:bg-slate-800 py-4 rounded-xl text-lg font-black text-white shadow-lg active:scale-95 transition-all">手動修正</button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    }
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
