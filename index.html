<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino-Q 企業 AI 財務執行官治理平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 柔和藍綠色系調色盤 */
        body { 
            background-color: #f0fdfa; 
            color: #0f172a; 
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace; 
            overflow: hidden; 
            font-size: 16px; 
        }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f0fdfa; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #99f6e4; border-radius: 4px; }
        .panel-bg { background-color: #ffffff; border: 2px solid #ccfbf1; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .progress-bar { transition: width 0.05s linear; }
        
        /* 動態強調效果 */
        .log-entry { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isRunning, setIsRunning] = useState(true);
            const [demoSpeed, setDemoSpeed] = useState('slow'); 
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            // 交易狀態
            const [humanQueue, setHumanQueue] = useState([]); 
            const [pipelineLogs, setPipelineLogs] = useState([]);
            const [adjudicationLogs, setAdjudicationLogs] = useState([]);
            const [healingLogs, setHealingLogs] = useState([]);
            const [evidenceLogs, setEvidenceLogs] = useState([]);

            const counterRef = useRef(700240); 
            const prevHashRef = useRef("00000000000000000000000000000000");

            const mockHash = (str) => {
                let hash = 0;
                for (let i = 0; i < str.length; i++) hash = (hash << 5) - hash + str.charCodeAt(i) | 0;
                return Math.abs(hash).toString(16).padStart(32, '0');
            };

            const getTime = () => new Date().toLocaleTimeString('zh-TW', { hour12: false });

            // 單筆原子化裁決邏輯
            const tick = () => {
                if (!isRunning) return;

                const txnID = `TXN-${counterRef.current}`;
                const rand = Math.random();
                let error = null;
                let rawCmd = `{"to":"ACC-8872", "amount":50000, "ccy":"TWD"}`;

                // 模擬 AI 推論偏移場景
                if (rand > 0.98) {
                    error = { id: txnID, type: 'malicious', rawCmd: `{"amount":-5000, "ccy":"TWD"}`, msg: "嚴重：檢出負數轉帳" };
                } else if (rand > 0.94) {
                    error = { id: txnID, type: 'require_human', rawCmd: `{"amount":50000, "ccy":"USD"}`, aiFixed: `{"amount":50000, "ccy":"TWD"}`, msg: "疑義：幣別偏移(USD限制)" };
                } else if (rand > 0.90) {
                    error = { id: txnID, type: 'typo', rawCmd: `{"amount":"50000", "ccy":"TWD"}`, aiFixed: `{"amount":50000, "ccy":"TWD"}`, msg: "偏移：格式型別錯誤" };
                }

                // 1. MPU 推論階段
                setPipelineLogs(l => [{ id: txnID, cmd: rawCmd, type: error?.type || 'normal', time: getTime() }, ...l].slice(0, 15));

                // 2. MCU 即時裁決
                setTimeout(() => {
                    if (!error) {
                        setAdjudicationLogs(l => [{ id: txnID, status: 'O', msg: '裁決：合規准予執行', time: getTime() }, ...l].slice(0, 15));
                        generateEvidence(txnID, 'TXN_ALLOW');
                    } else if (error.type === 'typo') {
                        setAdjudicationLogs(l => [{ id: txnID, status: '-', msg: '檢測偏移：自動格式校準', time: getTime() }, ...l].slice(0, 15));
                        setHealingLogs(l => [{ id: txnID, from: error.rawCmd, to: error.aiFixed, sim: '99% 格式校準' }, ...l].slice(0, 15));
                        generateEvidence(txnID, 'AUTO_HEAL');
                    } else {
                        setAdjudicationLogs(l => [{ id: txnID, status: 'X', msg: error.msg, time: getTime() }, ...l].slice(0, 15));
                        setHumanQueue(q => [...q, { id: txnID, error, time: getTime() }]);
                        generateEvidence(txnID, error.type === 'malicious' ? 'HARD_BLOCK' : 'PENDING_REVIEW');
                    }
                }, 100);

                counterRef.current += 1;
            };

            const generateEvidence = (id, action) => {
                const newHash = mockHash(`${id}${action}${prevHashRef.current}`);
                setEvidenceLogs(prev => [{ 
                    id, time: getTime(), action, hash: newHash 
                }, ...prev].slice(0, 20));
                prevHashRef.current = newHash;
            };

            const handleHumanAction = (task, actionType, customCmd = null) => {
                if (actionType === 'ALLOW') {
                    setHealingLogs(l => [{ id: task.id, from: task.error.rawCmd, to: task.error.aiFixed, sim: '100% 人工授權' }, ...l].slice(0, 20));
                    generateEvidence(task.id, 'MANUAL_ALLOW');
                } else if (actionType === 'DENY') {
                    generateEvidence(task.id, 'MANUAL_REJECT');
                } else if (actionType === 'MANUAL') {
                    setHealingLogs(l => [{ id: task.id, from: task.error.rawCmd, to: customCmd, sim: '100% 手動覆寫' }, ...l].slice(0, 20));
                    generateEvidence(task.id, 'MANUAL_OVERRIDE');
                }
                setHumanQueue(prev => prev.filter(t => t.id !== task.id));
                if (humanQueue.length <= 1) setIsModalOpen(false);
            };

            useEffect(() => {
                const speed = demoSpeed === 'realtime' ? 100 : 1500; 
                const interval = setInterval(tick, speed);
                return () => clearInterval(interval);
            }, [isRunning, demoSpeed]);

            return (
                <div className="h-screen p-6 flex flex-col gap-4 relative">
                    <header className="flex justify-between items-center">
                        <div className="flex flex-col">
                            <h1 className="text-3xl font-black text-teal-900 uppercase tracking-tighter">Arduino-Q 企業 AI 財務執行官治理平台</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex bg-teal-100 rounded-lg p-1 border-2 border-teal-200">
                                <button onClick={() => setDemoSpeed('realtime')} className={`px-6 py-1.5 rounded-md text-sm font-black transition-all ${demoSpeed === 'realtime' ? 'bg-teal-600 text-white shadow-md' : 'text-teal-500'}`}>實時模式</button>
                                <button onClick={() => setDemoSpeed('slow')} className={`px-6 py-1.5 rounded-md text-sm font-black transition-all ${demoSpeed === 'slow' ? 'bg-amber-600 text-white shadow-md' : 'text-teal-500'}`}>展示模式</button>
                            </div>
                            <button onClick={() => setIsModalOpen(true)} className="bg-white border-2 border-rose-300 text-rose-600 px-5 py-2 rounded-lg text-base font-black hover:bg-rose-50 transition-all shadow-md">
                                風控池 <span className="bg-rose-600 text-white px-3 py-0.5 rounded-full ml-2">{humanQueue.length}</span>
                            </button>
                            <button onClick={() => setIsRunning(!isRunning)} className={`px-8 py-2 rounded-lg text-base font-black text-white shadow-lg transition-all ${isRunning ? 'bg-teal-800' : 'bg-emerald-600'}`}>
                                {isRunning ? '暫停' : '啟動'}
                            </button>
                        </div>
                    </header>

                    {/* 新增系統情境說明字卡 */}
                    <div className="bg-white border-l-8 border-teal-600 p-5 rounded-r-xl shadow-sm">
                        <h3 className="text-teal-800 font-black text-lg mb-1">硬體裁決邊界展示場景說明</h3>
                        <p className="text-teal-900/80 text-base font-bold leading-relaxed">
                            本展示模擬企業內部 AI 財務代理人在邊緣裝置上生成交易指令之完整流程。所有推論結果必須先經由 MCU 之 TrustZone-M 硬體隔離區塊進行即時裁決後，方可進入核心交易系統。
                            裁決層不依賴作業系統權限控管，而是透過實體隔離與硬體閘控機制，對每一筆交易進行原子化審核與強制阻斷。
                            若檢測到語義偏移、格式異常或潛在風險指令，系統將觸發自動修復或人工審查流程；所有裁決結果均同步生成硬體證據鏈紀錄，以確保可驗證、可追溯與不可繞過之治理邊界。
                            本場景旨在展示：在非確定性 AI 推論與金融核心系統之間，如何建立一個具物理強制力的最終決策閥門。
                        </p>
                    </div>

                    <div className="grid grid-cols-2 grid-rows-2 gap-6 flex-1 overflow-hidden mt-2">
                        {/* 1. MPU 階段 */}
                        <div className="panel-bg rounded-xl flex flex-col overflow-hidden">
                            <div className="bg-teal-800 px-4 py-3 text-lg font-black text-white"> [1] MPU 推論交易流 (非確定性生成)</div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                                {pipelineLogs.map((log, i) => (
                                    <div key={i} className="log-entry text-base font-mono flex gap-4 border-b border-teal-50 pb-2">
                                        <span className="text-teal-400 font-bold">[{log.time}]</span>
                                        <span className="text-teal-800 font-bold">{log.id}</span>
                                        <span className={log.type !== 'normal' ? 'text-rose-600 font-black' : 'text-slate-500'}>{log.cmd}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 2. MCU 即時裁決 */}
                        <div className="panel-bg rounded-xl flex flex-col overflow-hidden">
                            <div className="bg-teal-700 px-4 py-3 text-lg font-black text-white"> [2] MCU TrustZone-M 確定性裁決</div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                                {adjudicationLogs.map((log, i) => (
                                    <div key={i} className="log-entry text-base font-mono flex justify-between bg-teal-50/50 p-4 rounded-lg border-l-4 border-teal-500 shadow-sm">
                                        <span className="text-slate-700 font-bold"><span className="text-teal-600 mr-2">{log.id}</span> {log.msg}</span>
                                        <span className={`font-black text-xl ${log.status === 'O' ? 'text-teal-600' : 'text-amber-600'}`}>[{log.status}]</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 3. 邏輯校準 */}
                        <div className="panel-bg rounded-xl flex flex-col overflow-hidden">
                            <div className="bg-teal-600 px-4 py-3 text-lg font-black text-white"> [3] 邊緣自動修復中心 (Self-Healing)</div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                                {healingLogs.map((log, i) => (
                                    <div key={i} className="log-entry text-base font-mono bg-teal-50 p-4 rounded-lg border-2 border-teal-100">
                                        <div className="text-teal-700 font-black mb-2">{log.id} | {log.sim}</div>
                                        <div className="text-rose-400 line-through truncate opacity-60 italic">{log.from}</div>
                                        <div className="text-teal-800 truncate font-black text-lg">修正 ➔ {log.to}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 4. 證據帳本 */}
                        <div className="panel-bg rounded-xl flex flex-col overflow-hidden">
                            <div className="bg-teal-900 px-4 py-3 text-lg font-black text-white"> [4] 不可篡改治理帳本 (Evidence Chain)</div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                                {evidenceLogs.map((log, i) => (
                                    <div key={i} className="log-entry text-sm font-mono bg-slate-50 p-3 rounded-lg border-l-4 border-teal-900 flex flex-col">
                                        <div className="flex justify-between font-black text-slate-800 text-base">
                                            <span>{log.id}</span>
                                            <span className="text-teal-700">{log.action}</span>
                                        </div>
                                        <div className="text-slate-400 truncate text-[10px] mt-1">SECURE_HASH: {log.hash}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 p-10 backdrop-blur-md">
                            <div className="bg-white rounded-2xl w-full max-w-6xl flex flex-col max-h-[90vh] shadow-2xl border-4 border-teal-600">
                                <div className="bg-teal-600 px-8 py-6 flex justify-between items-center text-white font-black text-2xl">
                                    <span>⚠️ 異步風控審查池 (Pending Adjudication)</span>
                                    <button onClick={() => setIsModalOpen(false)}>✕</button>
                                </div>
                                <div className="p-8 overflow-y-auto space-y-8 custom-scrollbar">
                                    {humanQueue.length === 0 ? <div className="text-center py-32 text-slate-400 text-3xl font-bold italic">系統運行正常，無異常攔截筆數</div> :
                                        humanQueue.map((task) => (
                                            <div key={task.id} className="bg-white rounded-xl p-8 border-2 border-teal-100 shadow-sm">
                                                <div className="text-teal-800 font-black text-2xl mb-6 border-b-2 border-teal-50 pb-4">交易單號：{task.id}</div>
                                                <div className="grid grid-cols-12 gap-10 items-center bg-slate-50 p-8 rounded-2xl">
                                                    <div className="col-span-4">
                                                        <div className="text-xs text-rose-500 font-black mb-3">AI 原始偏移指令</div>
                                                        <div className="text-rose-700 text-xl font-bold font-mono break-all line-through bg-rose-50 p-4 rounded-xl">{task.error.rawCmd}</div>
                                                    </div>
                                                    <div className="col-span-4">
                                                        <div className="text-xs text-teal-600 font-black mb-3">系統合規修正建議</div>
                                                        <div className="text-teal-800 text-xl font-bold font-mono break-all bg-teal-50 p-4 rounded-xl">{task.error.aiFixed || '無法自動校準'}</div>
                                                    </div>
                                                    <div className="col-span-4 flex flex-col gap-3">
                                                        <button onClick={() => handleHumanAction(task, 'ALLOW')} className="w-full bg-teal-600 py-4 rounded-xl text-xl font-black text-white hover:bg-teal-700 transition-all">核准放行</button>
                                                        <button onClick={() => handleHumanAction(task, 'DENY')} className="w-full bg-rose-600 py-4 rounded-xl text-xl font-black text-white hover:bg-rose-700 transition-all">永久阻斷</button>
                                                        <button onClick={() => {const edit = prompt('手動覆寫交易數據:', task.error.rawCmd); if(edit) handleHumanAction(task, 'MANUAL', edit)}} className="w-full bg-slate-700 py-4 rounded-xl text-xl font-black text-white">手動修正</button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    }
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
