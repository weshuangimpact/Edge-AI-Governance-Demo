<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDUINO-Q 金融治理與安全轉帳防護系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }
        .progress-bar { transition: width 0.1s linear; }
        .glow-green { box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isRunning, setIsRunning] = useState(true);
            const [demoSpeed, setDemoSpeed] = useState('slow'); 
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            const [currentTask, setCurrentTask] = useState({ id: 'BATCH-402', step: 0, total: 100, errors: [] });
            const [humanQueue, setHumanQueue] = useState([]); 
            const [pipelineLogs, setPipelineLogs] = useState([]);
            const [adjudicationLogs, setAdjudicationLogs] = useState([]);
            const [healingLogs, setHealingLogs] = useState([]);
            const [evidenceLogs, setEvidenceLogs] = useState([]);

            const counterRef = useRef(1000);
            const taskIDRef = useRef(402);
            const prevHashRef = useRef("00000000000000000000000000000000");

            const mockHash = (str) => {
                let hash = 0;
                for (let i = 0; i < str.length; i++) hash = (hash << 5) - hash + str.charCodeAt(i) | 0;
                return Math.abs(hash).toString(16).padStart(32, '0');
            };

            const getTime = () => new Date().toISOString().substring(11, 23);

            const tick = () => {
                if (!isRunning) return;

                setCurrentTask(prev => {
                    const nextStep = prev.step + 1;
                    const cmdID = `${prev.id}-TXN${String(nextStep).padStart(3, '0')}`;
                    const rand = Math.random();
                    let error = null;
                    let rawCmd = `{"txn":"${cmdID}", "amount":5000, "ccy":"TWD", "to":"ACC-9982"}`;

                    // 金融偏移場景模擬
                    if (rand > 0.98) {
                        error = { id: cmdID, type: 'malicious', rawCmd: `{"amount": -1000000, "ccy":"TWD"}`, msg: "檢出負數交易(溢位風險)" };
                    } else if (rand > 0.94) {
                        error = { id: cmdID, type: 'require_human', rawCmd: `{"amount": 50000, "ccy":"USD"}`, aiFixed: `{"amount": 50000, "ccy":"TWD"}`, msg: "幣別權限異常(USD限制)" };
                    } else if (rand > 0.90) {
                        error = { id: cmdID, type: 'typo', rawCmd: `{"amount": "5000", "ccy":"TWD"}`, aiFixed: `{"amount": 5000, "ccy":"TWD"}`, msg: "型別錯誤(String轉Int)" };
                    }

                    setPipelineLogs(l => [{ id: cmdID, cmd: rawCmd, type: error?.type || 'normal' }, ...l].slice(0, 30));
                    const newErrors = error ? [...prev.errors, error] : prev.errors;

                    if (nextStep >= 100) {
                        finalizeTask(prev.id, newErrors);
                        taskIDRef.current += 1;
                        return { id: `BATCH-${String(taskIDRef.current).padStart(3, '0')}`, step: 0, total: 100, errors: [] };
                    }
                    return { ...prev, step: nextStep, errors: newErrors };
                });
            };

            const finalizeTask = (taskID, errors) => {
                if (errors.length === 0) {
                    setAdjudicationLogs(l => [{ taskID, status: 'O', msg: '整組清算通過', time: getTime() }, ...l].slice(0, 50));
                    generateEvidence(taskID, 'BATCH_CLEAR');
                } else {
                    setAdjudicationLogs(l => [{ taskID, status: '-', msg: `攔截 ${errors.length} 筆可疑交易`, time: getTime() }, ...l].slice(0, 50));
                    const toAuto = errors.filter(e => e.type === 'typo');
                    const toHuman = errors.filter(e => e.type === 'require_human' || e.type === 'malicious');

                    toAuto.forEach(e => {
                        setHealingLogs(l => [{ id: e.id, from: e.rawCmd, to: e.aiFixed, sim: '自動校準金額型別' }, ...l].slice(0, 50));
                        generateEvidence(e.id, 'AUTO_CORRECTION');
                    });
                    if (toHuman.length > 0) setHumanQueue(q => [...q, { taskID, errors: toHuman }]);
                }
            };

            const generateEvidence = (id, action) => {
                const currentCounter = counterRef.current++;
                const newHash = mockHash(`${id}${action}${currentCounter}${prevHashRef.current}`);
                setEvidenceLogs(prev => [{ 
                    id, time: getTime(), action, counter: currentCounter.toString(16).toUpperCase(), hash: newHash 
                }, ...prev].slice(0, 50));
                prevHashRef.current = newHash;
            };

            const handleHumanAction = (task, errorIdx, actionType, customCmd = null) => {
                const error = task.errors[errorIdx];
                if (actionType === 'ALLOW') {
                    setHealingLogs(l => [{ id: error.id, from: error.rawCmd, to: error.aiFixed, sim: '100% 風控核准' }, ...l].slice(0, 50));
                    generateEvidence(error.id, 'RISK_APPROVED');
                } else if (actionType === 'DENY') {
                    generateEvidence(error.id, 'RISK_DENIED');
                } else if (actionType === 'MANUAL') {
                    setHealingLogs(l => [{ id: error.id, from: error.rawCmd, to: customCmd, sim: '100% 人工覆寫' }, ...l].slice(0, 50));
                    generateEvidence(error.id, 'MANUAL_VOID');
                }

                setHumanQueue(prev => {
                    const newQueue = prev.map(t => {
                        if (t.taskID === task.taskID) {
                            const newErrors = t.errors.filter((_, i) => i !== errorIdx);
                            return { ...t, errors: newErrors };
                        }
                        return t;
                    }).filter(t => t.errors.length > 0);
                    if (newQueue.length === 0) setIsModalOpen(false);
                    return newQueue;
                });
            };

            useEffect(() => {
                const speed = demoSpeed === 'realtime' ? 15 : 180; 
                const interval = setInterval(tick, speed);
                return () => clearInterval(interval);
            }, [isRunning, demoSpeed]);

            return (
                <div className="h-screen p-4 flex flex-col gap-4 relative">
                    <header className="flex justify-between items-center pb-2 border-b border-slate-800">
                        <div className="flex flex-col">
                            <h1 className="text-xl font-bold text-emerald-400 uppercase tracking-tighter">ARDUINO-Q 開發板 MPU邊緣運算+MCU(TrustZone-M) 金融治理與安全轉帳防護裝置 </h1>
                            <div className="flex items-center gap-4 mt-1 font-mono">
                                <div className="text-[10px] text-slate-500">BATCH_ID: <span className="text-emerald-500 font-bold">{currentTask.id}</span></div>
                                <div className="w-48 h-1 bg-slate-800 rounded-full overflow-hidden">
                                    <div className="h-full bg-emerald-500 progress-bar" style={{ width: `${currentTask.step}%` }}></div>
                                </div>
                                <div className="text-[10px] text-slate-500">掃描進度: {currentTask.step}%</div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="flex bg-slate-900 rounded p-1 border border-slate-800">
                                <button onClick={() => setDemoSpeed('realtime')} className={`px-3 py-1 rounded text-[10px] font-bold transition-colors ${demoSpeed === 'realtime' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-500'}`}>Real-time</button>
                                <button onClick={() => setDemoSpeed('slow')} className={`px-3 py-1 rounded text-[10px] font-bold transition-colors ${demoSpeed === 'slow' ? 'bg-amber-600 text-white shadow-lg' : 'text-slate-500'}`}>Slow-mo</button>
                            </div>
                            <button onClick={() => setIsModalOpen(true)} className="bg-rose-950 border border-rose-800 text-rose-400 px-4 py-1.5 rounded text-sm font-bold shadow-lg">
                                異常交易池 <span className="bg-rose-600 text-white px-2 rounded-full ml-1">{humanQueue.length}</span>
                            </button>
                            <button onClick={() => setIsRunning(!isRunning)} className={`px-4 py-1.5 rounded text-sm font-bold shadow-lg transition-all ${isRunning ? 'bg-slate-800 hover:bg-slate-700' : 'bg-emerald-700 hover:bg-emerald-600'}`}>
                                {isRunning ? '暫停系統' : '啟動防護'}
                            </button>
                        </div>
                    </header>

                    <div className="grid grid-cols-2 grid-rows-2 gap-4 h-[calc(100vh-100px)]">
                        <div className="bg-[#0b0f1a] border border-emerald-900/30 rounded-lg flex flex-col overflow-hidden glow-green">
                            <div className="bg-emerald-950/20 px-3 py-2 text-xs font-bold text-emerald-500 border-b border-emerald-900/30"> [1] AI 推論轉帳流 (非確定性生成)</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                                {pipelineLogs.map((log, i) => (
                                    <div key={i} className="text-[9px] font-mono flex gap-2">
                                        <span className="text-emerald-700">{log.id}</span>
                                        <span className={log.type !== 'normal' ? 'text-rose-400 font-bold' : 'text-slate-500'}>{log.cmd}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-[#0b0f1a] border border-rose-900/30 rounded-lg flex flex-col overflow-hidden shadow-xl">
                            <div className="bg-rose-950/20 px-3 py-2 text-xs font-bold text-rose-400 border-b border-rose-900/30"> [2] MCU TrustZone-M 確定性裁決</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                                {adjudicationLogs.map((log, i) => (
                                    <div key={i} className="text-[10px] font-mono flex justify-between bg-slate-900/50 p-1.5 rounded border-l-2 border-rose-600">
                                        <span className="text-slate-400">{log.taskID}: {log.msg}</span>
                                        <span className={`font-bold ${log.status === 'O' ? 'text-emerald-500' : 'text-amber-500'}`}>[{log.status}]</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-[#0b0f1a] border border-amber-900/30 rounded-lg flex flex-col overflow-hidden shadow-xl">
                            <div className="bg-amber-950/20 px-3 py-2 text-xs font-bold text-amber-400 border-b border-amber-900/30"> [3] 邊緣端邏輯與格式修復</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-2 custom-scrollbar">
                                {healingLogs.map((log, i) => (
                                    <div key={i} className="text-[9px] font-mono bg-slate-900/80 p-2 rounded border border-amber-900/20 shadow-inner">
                                        <div className="text-amber-500 mb-1">{log.id} | {log.sim}</div>
                                        <div className="text-rose-400/60 line-through truncate italic">{log.from}</div>
                                        <div className="text-emerald-400 truncate">REPAIRED: {log.to}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-[#0b0f1a] border border-cyan-900/30 rounded-lg flex flex-col overflow-hidden shadow-xl">
                            <div className="bg-cyan-950/20 px-3 py-2 text-xs font-bold text-cyan-400 border-b border-cyan-900/30"> [4] 不可篡改金融治理帳本 (Evidence)</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                                {evidenceLogs.map((log, i) => (
                                    <div key={i} className="text-[9px] font-mono bg-slate-900/30 p-2 rounded border-l-2 border-cyan-600 flex flex-col">
                                        <div className="flex justify-between font-bold"><span>{log.id}</span><span className="text-cyan-400">{log.action}</span></div>
                                        <div className="text-slate-600 truncate text-[8px]">CTR: {log.counter} | H: {log.hash}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-950/90 flex items-center justify-center z-50 p-6 backdrop-blur-md">
                            <div className="bg-[#0f172a] border-2 border-rose-500 rounded-xl w-full max-w-4xl flex flex-col max-h-[85vh] shadow-[0_0_50px_rgba(239,68,68,0.3)]">
                                <div className="bg-rose-950/30 px-6 py-4 border-b border-rose-900 flex justify-between items-center text-rose-400 font-bold">
                                    <span className="text-lg">⚠️ 風控審查池 (Suspicious Transactions)</span>
                                    <button onClick={() => setIsModalOpen(false)} className="text-2xl hover:text-white transition-colors">✕</button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-6 custom-scrollbar">
                                    {humanQueue.length === 0 ? <div className="text-center py-20 text-slate-500 italic">無待核准之異常交易</div> :
                                        humanQueue.map((task) => (
                                            <div key={task.taskID} className="bg-slate-900/80 rounded-lg p-4 border border-slate-800">
                                                <div className="text-emerald-400 font-bold mb-4 border-b border-slate-800 pb-2 flex justify-between">
                                                    <span>批次清單：{task.taskID}</span>
                                                    <span className="text-xs text-rose-500 animate-pulse">檢測到 {task.errors.length} 筆嚴重風險</span>
                                                </div>
                                                <div className="space-y-4">
                                                    {task.errors.map((err, idx) => (
                                                        <div key={idx} className="grid grid-cols-12 gap-4 items-center bg-black/40 p-4 rounded border border-rose-900/30">
                                                            <div className="col-span-2 text-[10px] text-slate-500 font-mono">{err.id}</div>
                                                            <div className="col-span-3">
                                                                <div className="text-[8px] text-rose-500 mb-1 font-bold">攔截風險數據</div>
                                                                <div className="text-rose-400 text-[10px] font-mono break-all line-through">{err.rawCmd}</div>
                                                            </div>
                                                            <div className="col-span-3">
                                                                <div className="text-[8px] text-emerald-500 mb-1 font-bold">建議修正方案</div>
                                                                <div className="text-emerald-400 text-[10px] font-mono break-all">{err.aiFixed || '無法自動修正'}</div>
                                                            </div>
                                                            <div className="col-span-4 flex gap-1">
                                                                <button onClick={() => handleHumanAction(task, idx, 'ALLOW')} className="flex-1 bg-emerald-800 hover:bg-emerald-700 py-2 rounded text-[10px] font-bold text-white transition-all shadow-lg">核准(放行)</button>
                                                                <button onClick={() => handleHumanAction(task, idx, 'DENY')} className="flex-1 bg-rose-800 hover:bg-rose-700 py-2 rounded text-[10px] font-bold text-white transition-all shadow-lg">拒絕(沖銷)</button>
                                                                <button onClick={() => {const edit = prompt('手動覆寫交易數據:', err.rawCmd); if(edit) handleHumanAction(task, idx, 'MANUAL', edit)}} className="flex-1 bg-blue-800 hover:bg-blue-700 py-2 rounded text-[10px] font-bold text-white transition-all shadow-lg">手動(修正)</button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))
                                    }
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
